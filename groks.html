<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ GROK RESPONSES API TEST</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ffaa;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #header {
            background: #1a1a1a;
            padding: 12px 20px;
            border-bottom: 2px solid #00ffaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        #status {
            font-size: 12px;
            padding: 4px 8px;
            background: #00ffaa20;
            border-radius: 4px;
        }
        
        #main {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            min-height: 0;
        }
        
        #sessions-panel {
            width: 250px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #sessions-header {
            padding: 12px;
            background: #00ffaa20;
            border-bottom: 1px solid #333;
            font-weight: bold;
        }
        
        #sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .session-item {
            padding: 8px;
            margin-bottom: 8px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        
        .session-item:hover {
            border-color: #00ffaa;
        }
        
        .session-item.active {
            border-color: #00ffaa;
            background: #00ffaa10;
        }
        
        .session-id {
            font-family: monospace;
            color: #00ffaa;
            margin-bottom: 4px;
            word-break: break-all;
        }
        
        .session-meta {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #888;
        }
        
        #chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        
        #chat-header {
            padding: 12px;
            background: #00ffaa20;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #current-session-info {
            font-size: 11px;
            color: #888;
        }
        
        #new-chat-btn {
            background: transparent;
            border: 1px solid #00ffaa;
            color: #00ffaa;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        #new-chat-btn:hover {
            background: #00ffaa;
            color: #0a0a0a;
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 8px;
            line-height: 1.4;
        }
        
        .user {
            align-self: flex-end;
            background: #00ffaa20;
            border-left: 2px solid #00ffaa;
        }
        
        .assistant {
            align-self: flex-start;
            background: #333;
            border-left: 2px solid #888;
        }
        
        .system {
            align-self: center;
            background: #444;
            color: #ffaa00;
            font-size: 11px;
            border-left: 2px solid #ffaa00;
        }
        
        .message-id {
            font-size: 8px;
            color: #666;
            margin-top: 4px;
            text-align: right;
        }
        
        #input-area {
            padding: 20px;
            border-top: 1px solid #333;
        }
        
        #input-container {
            display: flex;
            gap: 10px;
        }
        
        #message-input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #00ffaa;
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            resize: none;
        }
        
        #message-input:focus {
            outline: none;
            border-color: #00ffaa;
        }
        
        #send-btn {
            background: transparent;
            border: 1px solid #00ffaa;
            color: #00ffaa;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #send-btn:hover:not(:disabled) {
            background: #00ffaa;
            color: #0a0a0a;
        }
        
        #send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        #model-selector {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        select {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #00ffaa;
            padding: 4px;
            border-radius: 4px;
        }
        
        .thinking {
            font-style: italic;
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="title">⚡ GROK RESPONSES API TEST</div>
        <div id="status">🟢 CONNECTED</div>
    </div>
    
    <div id="main">
        <!-- Sessions Panel -->
        <div id="sessions-panel">
            <div id="sessions-header">
                ACTIVE SESSIONS (30d)
            </div>
            <div id="sessions-list">
                <!-- Populated by JS -->
            </div>
        </div>
        
        <!-- Chat Panel -->
        <div id="chat-panel">
            <div id="chat-header">
                <div id="current-session-info">
                    <span id="current-session-id">No active session</span>
                </div>
                <button id="new-chat-btn">NEW CHAT</button>
            </div>
            
            <div id="messages">
                <!-- Messages appear here -->
            </div>
            
            <div id="input-area">
                <div id="model-selector">
                    <span>Model:</span>
                    <select id="model-select">
                        <option value="grok-4.20-beta-latest-non-reasoning">Grok 4.20 (Non-reasoning)</option>
                        <option value="grok-4.20-beta-latest-reasoning">Grok 4.20 (Reasoning)</option>
                    </select>
                    
                    <span style="margin-left: auto;">System Prompt:</span>
                    <input type="text" id="system-prompt" placeholder="Optional system prompt" style="background:#0a0a0a; border:1px solid #333; color:#00ffaa; padding:4px; width:200px;">
                </div>
                
                <div id="input-container">
                    <textarea id="message-input" rows="3" placeholder="Type your message..."></textarea>
                    <button id="send-btn">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentResponseId = null;
        let messages = [];
        let sessions = [];
        
        // DOM elements
        const sessionsList = document.getElementById('sessions-list');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const newChatBtn = document.getElementById('new-chat-btn');
        const currentSessionIdSpan = document.getElementById('current-session-id');
        const modelSelect = document.getElementById('model-select');
        const systemPromptInput = document.getElementById('system-prompt');
        
        // Load sessions on startup
        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                sessions = await response.json();
                renderSessions();
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }
        
        function renderSessions() {
            if (sessions.length === 0) {
                sessionsList.innerHTML = '<div style="color:#666; text-align:center; padding:20px;">No active sessions</div>';
                return;
            }
            
            sessionsList.innerHTML = sessions.map(s => `
                <div class="session-item ${s.id === currentResponseId ? 'active' : ''}" 
                     onclick="loadSession('${s.id}')">
                    <div class="session-id">${s.id.substring(0, 16)}...</div>
                    <div class="session-meta">
                        <span>${new Date(s.created).toLocaleString()}</span>
                        <span>${s.messageCount} msgs</span>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadSession(responseId) {
            try {
                const response = await fetch(`/api/chat/${responseId}`);
                const data = await response.json();
                
                // Convert to message format
                messages = data.messages || [];
                currentResponseId = responseId;
                currentSessionIdSpan.textContent = responseId.substring(0, 16) + '...';
                renderMessages();
                
                // Highlight in sessions list
                renderSessions();
                
            } catch (e) {
                console.error('Failed to load session:', e);
            }
        }
        
        function renderMessages() {
            if (messages.length === 0) {
                messagesDiv.innerHTML = '<div style="color:#666; text-align:center; padding:40px;">No messages. Start a new chat.</div>';
                return;
            }
            
            messagesDiv.innerHTML = messages.map(msg => `
                <div class="message ${msg.role}">
                    <div>${msg.content}</div>
                    ${msg.id ? `<div class="message-id">${msg.id}</div>` : ''}
                </div>
            `).join('');
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Disable input while sending
            sendBtn.disabled = true;
            messageInput.disabled = true;
            
            // Add user message to UI immediately
            messages.push({
                role: 'user',
                content: message
            });
            renderMessages();
            messageInput.value = '';
            
            // Add thinking indicator
            messages.push({
                role: 'assistant',
                content: '⚡ Thinking...',
                thinking: true
            });
            renderMessages();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        previousResponseId: currentResponseId,
                        systemPrompt: systemPromptInput.value.trim() || undefined,
                        model: modelSelect.value
                    })
                });
                
                const data = await response.json();
                
                // Remove thinking indicator
                messages.pop();
                
                if (data.error) {
                    messages.push({
                        role: 'assistant',
                        content: `❌ Error: ${data.error}`
                    });
                } else {
                    // Add actual response
                    messages.push({
                        role: 'assistant',
                        content: data.response.choices[0].message.content,
                        id: data.responseId
                    });
                    
                    // Update current session
                    currentResponseId = data.responseId;
                    currentSessionIdSpan.textContent = currentResponseId.substring(0, 16) + '...';
                    
                    // Refresh sessions list
                    await loadSessions();
                }
                
                renderMessages();
                
            } catch (e) {
                messages.pop();
                messages.push({
                    role: 'assistant',
                    content: `❌ Error: ${e.message}`
                });
                renderMessages();
            }
            
            // Re-enable input
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
        
        async function newChat() {
            messages = [];
            currentResponseId = null;
            currentSessionIdSpan.textContent = 'New chat';
            renderMessages();
        }
        
        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        newChatBtn.addEventListener('click', newChat);
        
        // Initial load
        loadSessions();
        setInterval(loadSessions, 5000); // Refresh sessions every 5 seconds
    </script>
</body>
</html>
