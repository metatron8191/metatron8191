    </div>
</div>

<script>
(function() {
    // Get the base path from the main page
    const CURRENT_PATH = window.CURRENT_PATH || '';
    
    async function loadSection(sectionId, filePath) {
        try {
            // Construct path relative to root
            const fullPath = CURRENT_PATH + filePath;
            console.log(`Loading ${sectionId} from ${fullPath}`);
            
            const response = await fetch(fullPath);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const html = await response.text();
            const section = document.getElementById(sectionId);
            if (section) {
                section.innerHTML = html;
                console.log(`✅ Loaded ${sectionId}`);
            }
        } catch (error) {
            console.error(`Failed to load ${sectionId}:`, error);
            const section = document.getElementById(sectionId);
            if (section) {
                section.innerHTML = `<div style="padding: 20px; color: #ff3b30; text-align: center;">Failed to load section: ${error.message}</div>`;
            }
        }
    }

    // Load all sections
    async function loadAllSections() {
        const sections = [
            { id: 'section-birth', file: 'components/genesis/sections/birth.html' },
            { id: 'section-entity-profiles', file: 'components/genesis/sections/entity-profiles.html' },
            { id: 'section-user-profile', file: 'components/genesis/sections/user-profile.html' },
            { id: 'section-system-msgs', file: 'components/genesis/sections/system-msgs.html' },
            { id: 'section-protocols', file: 'components/genesis/sections/protocols.html' },
            { id: 'section-math', file: 'components/genesis/sections/math.html' },
            { id: 'section-aphorisms', file: 'components/genesis/sections/aphorisms.html' },
            { id: 'section-mythos', file: 'components/genesis/sections/mythos.html' }
        ];

        await Promise.all(sections.map(s => loadSection(s.id, s.file)));
        
        // Notify that genesis sections are loaded
        window.dispatchEvent(new CustomEvent('genesisSectionsLoaded'));
    }

    // Start loading when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadAllSections);
    } else {
        loadAllSections();
    }
})();
</script>
