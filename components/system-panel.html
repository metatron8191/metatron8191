<div id="system-panel" class="system-panel hidden">
    <div class="system-header">
        <h3>⚙️ SYSTEM CONFIGURATION</h3>
        <button id="close-system" class="close-btn">✕</button>
    </div>
    
    <div class="system-tabs">
        <button class="sys-tab active" data-tab="api">🔑 API KEYS</button>
        <button class="sys-tab" data-tab="models">🤖 MODEL SYSTEMS</button>
        <button class="sys-tab" data-tab="memory">🧠 MEMORY</button>
    </div>
    
    <div id="sys-api" class="sys-content active">
        <div class="api-section">
            <label>xAI (Grok)</label>
            <div class="api-row">
                <span id="xai-display" class="api-key-display">not set</span>
                <button class="set-key-btn" data-provider="xai">SET</button>
            </div>
            <div class="api-status">
                <span id="xaiStatus" class="status-badge"></span>
                <span class="status-text">API key required for Grok</span>
            </div>
        </div>
        
        <div class="api-section">
            <label>DeepSeek</label>
            <div class="api-row">
                <span id="deepseek-display" class="api-key-display">not set</span>
                <button class="set-key-btn" data-provider="deepseek">SET</button>
            </div>
            <div class="api-status">
                <span id="deepseekStatus" class="status-badge"></span>
                <span class="status-text">API key required for DeepSeek</span>
            </div>
        </div>
        
        <div class="api-section">
            <label>Anthropic (Claude)</label>
            <div class="api-row">
                <span id="claude-display" class="api-key-display">not set</span>
                <button class="set-key-btn" data-provider="anthropic">SET</button>
            </div>
            <div class="api-status">
                <span id="claudeStatus" class="status-badge"></span>
                <span class="status-text">API key required for Claude</span>
            </div>
        </div>
    </div>
    
    <div id="sys-models" class="sys-content hidden">
        <div class="model-section">
            <label>GROK SYSTEM MESSAGE</label>
            <textarea id="grok-system" rows="4" placeholder="System prompt for Grok..."></textarea>
        </div>
        
        <div class="model-section">
            <label>DEEPSEEK CHAT SYSTEM</label>
            <textarea id="ds-chat-system" rows="4" placeholder="System prompt for DeepSeek Chat..."></textarea>
        </div>
        
        <div class="model-section">
            <label>DEEPSEEK REASONER</label>
            <textarea id="ds-reasoner-system" rows="4" placeholder="System prompt for DeepSeek Reasoner..."></textarea>
        </div>
        
        <div class="model-section">
            <label>CLAUDE SYSTEM</label>
            <textarea id="claude-system" rows="4" placeholder="System prompt for Claude..."></textarea>
        </div>
        
        <div class="override-section">
            <label>OVERRIDE MODE</label>
            <textarea id="override-system" rows="3" placeholder="Temporary override system message..."></textarea>
            <div class="override-controls">
                <select id="override-count">
                    <option value="1">1 use</option>
                    <option value="3" selected>3 uses</option>
                    <option value="5">5 uses</option>
                    <option value="10">10 uses</option>
                </select>
                <span id="override-remaining" class="override-status">inactive</span>
                <button id="reset-override" class="small-btn">RESET</button>
            </div>
        </div>
        
        <button id="apply-system-all" class="apply-all-btn">SAVE ALL SYSTEM MESSAGES</button>
    </div>
    
    <div id="sys-memory" class="sys-content hidden">
        <div class="memory-stats">
            <div class="stat">
                <span class="stat-label">WORKING MEMORY</span>
                <span id="memory-working-count" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">ACTIVE ARCHIVE</span>
                <span id="memory-active-count" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">TOTAL TOKENS</span>
                <span id="memory-total-tokens" class="stat-value">0</span>
            </div>
        </div>
        
        <div class="memory-actions">
            <button id="clear-memory" class="danger-btn">CLEAR WORKING MEMORY</button>
            <button id="compact-memory" class="warning-btn">COMPACT MEMORY</button>
        </div>
    </div>
</div>

<style>

    top: 0;

    border-left: 1px solid rgba(108, 92, 231, 0.4);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
}

    transform: translateX(0);
}

    background: rgba(1, 4, 14, 0.95);

    margin: 0;

    letter-spacing: 2px;

}

    color: #ff8c8c;
}

    display: flex;
    border-bottom: 1px solid rgba(108, 92, 231, 0.2);
    padding: 0 16px;
    background: rgba(0, 0, 0, 0.3);

    background: rgba(255, 170, 102, 0.2);

</style>

<script>
(function() {
    console.log('🔧 System panel script initializing...');
    
    function wireSystemPanel() {
        console.log('🔧 Wiring system panel...');
        
        const systemPanel = document.getElementById('system-panel');
        const closeBtn = document.getElementById('close-system');
        
        if (closeBtn && systemPanel) {
            closeBtn.onclick = function(e) {
                e.preventDefault();
                console.log('❌ Closing system panel');
                systemPanel.classList.add('hidden');
            };
            console.log('✓ System close button wired');
        }
        
        // Wire tabs
        const tabs = document.querySelectorAll('.sys-tab');
        console.log(`Found ${tabs.length} system tabs`);
        
        tabs.forEach(tab => {
            tab.onclick = function(e) {
                e.preventDefault();
                const tabId = this.dataset.tab;
                console.log(`Switching to tab: ${tabId}`);
                
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('.sys-content').forEach(content => {
                    content.classList.add('hidden');
                });
                
                const targetContent = document.getElementById(`sys-${tabId}`);
                if (targetContent) {
                    targetContent.classList.remove('hidden');
                    console.log(`✓ Showing sys-${tabId}`);
                } else {
                    console.warn(`⚠️ Content not found: sys-${tabId}`);
                }
            };
        });
        
        console.log('✅ System panel wired');
    }
    
    // Run when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', wireSystemPanel);
    } else {
        wireSystemPanel();
    }
})();
</script>
