<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⟁ METATRON · SYNAPSE·FILTER</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        :root {
            --void: #0a0a0a;
            --deep-space: #1a1a2e;
            --throne-gold: #c9a961;
            --witness-blue: #4a5f8f;
            --mercury-silver: #c0c0c0;
            --phi: 1.618;
            --lattice-dim: #2d2d2d;
            --success-green: #4a9d5f;
            --warning-red: #9d4a4a;
            --fire-orange: #ff6b35;
            --water-blue: #35a7ff;
            --electric-blue: #00ffff;
            --synapse-pink: #ff00aa;
            --synapse-yellow: #ffff00;
            --synapse-green: #00ffaa;
        }
        
        body {
            font-family: 'Courier New', 'SF Mono', Monaco, monospace;
            background: #000000;
            color: var(--mercury-silver);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        /* THREE canvas container - fullscreen background */
        #lattice-canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* UI layers - minimal, just enough to read */
        #header, #api-key-bar, #chat-container, #input-area {
            position: relative;
            z-index: 10;
            background-color: rgba(10, 10, 10, 0.5);
            backdrop-filter: none;
        }
        
        /* Header - minimal */
        #header {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.6) 0%, rgba(10, 10, 10, 0.7) 100%);
            border-bottom: 1px solid var(--throne-gold);
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        #sovereign-identity {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #glyph {
            font-size: 24px;
            animation: pulse 4.7s ease-in-out infinite;
            color: var(--throne-gold);
            text-shadow: 0 0 15px rgba(201, 169, 97, 0.5);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        #name {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--throne-gold);
        }
        
        #vertex-count {
            font-size: 10px;
            opacity: 0.6;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 12px;
        }
        
        #api-status {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 4px;
            background: var(--warning-red);
            color: white;
        }
        
        #api-status.connected {
            background: var(--success-green);
        }
        
        /* API Key Bar - minimal */
        #api-key-bar {
            background: rgba(26, 26, 46, 0.7);
            border-bottom: 1px solid var(--lattice-dim);
            padding: 6px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        
        #api-key-bar .key-label {
            font-size: 10px;
            color: var(--throne-gold);
            letter-spacing: 1px;
        }
        
        #api-key-bar input {
            background: rgba(10, 10, 10, 0.7);
            border: 1px solid var(--lattice-dim);
            color: var(--mercury-silver);
            padding: 6px 10px;
            border-radius: 4px;
            width: 240px;
            font-size: 11px;
        }
        
        #api-key-bar input:focus {
            outline: none;
            border-color: var(--throne-gold);
        }
        
        #api-key-bar button {
            background: transparent;
            border: 1px solid var(--throne-gold);
            color: var(--throne-gold);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
        }
        
        #api-key-bar button:hover {
            background: var(--throne-gold);
            color: var(--void);
        }
        
        #new-chat-btn {
            margin-left: auto;
            border-color: var(--witness-blue);
            color: var(--witness-blue);
        }
        
        /* Main Chat Area */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            min-height: 0;
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        
        /* STREAMLINED MESSAGE BOXES - no fat */
        .message {
            max-width: 80%;
            padding: 8px 12px;
            line-height: 1.4;
            position: relative;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: none;
            box-shadow: none;
            transition: all 0.2s ease;
        }
        
        /* Metatron messages - ghost-like */
        .message.metatron {
            align-self: flex-start;
            background: rgba(26, 26, 46, 0.3);
            border-left: 2px solid var(--fire-orange);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 5px rgba(255, 107, 53, 0.3);
        }
        
        .message.metatron::before {
            content: '⟁';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
            color: var(--fire-orange);
        }
        
        /* User messages - even more transparent */
        .message.user {
            align-self: flex-end;
            background: rgba(74, 95, 143, 0.25);
            border-left: 2px solid var(--water-blue);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 5px rgba(53, 167, 255, 0.3);
        }
        
        .timestamp {
            font-size: 7px;
            opacity: 0.3;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
            text-align: right;
        }
        
        /* Input Area - minimal */
        #input-area {
            border-top: 1px solid var(--lattice-dim);
            padding: 12px 0;
            background: rgba(10, 10, 10, 0.6);
            flex-shrink: 0;
        }
        
        #input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
        }
        
        #message-input {
            flex: 1;
            background: rgba(26, 26, 46, 0.4);
            border: 1px solid var(--lattice-dim);
            border-radius: 4px;
            padding: 8px 12px;
            color: var(--mercury-silver);
            font-family: inherit;
            font-size: 13px;
            resize: none;
            min-height: 36px;
            max-height: 100px;
        }
        
        #message-input:focus {
            outline: none;
            border-color: var(--throne-gold);
        }
        
        #message-input:disabled {
            opacity: 0.3;
        }
        
        #send-button {
            background: linear-gradient(135deg, var(--throne-gold) 0%, #b89854 100%);
            color: var(--void);
            border: none;
            border-radius: 4px;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            opacity: 0.8;
        }
        
        #send-button:hover:not(:disabled) {
            opacity: 1;
        }
        
        #send-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* Thinking indicator */
        .thinking-indicator {
            display: inline-block;
            opacity: 0.6;
            font-style: italic;
            color: var(--electric-blue);
        }
        
        .thinking-indicator::after {
            content: '...';
            animation: ellipsis 1.5s infinite;
        }
        
        @keyframes ellipsis {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }
        
        /* Dynamic status footer */
        #lattice-footer {
            position: fixed;
            bottom: 16px;
            right: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Courier New', monospace;
            font-size: 8px;
            text-align: right;
            z-index: 20;
            background: rgba(0,0,0,0.2);
            padding: 3px 8px;
            border-radius: 12px;
            pointer-events: none;
        }
        
        /* Scrollbar - minimal */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(10, 10, 10, 0.2);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--lattice-dim);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- THREE Canvas injected here -->
    <div id="lattice-canvas-container"></div>
    
    <!-- Dynamic footer -->
    <div id="lattice-footer">
        <span id="frequency-indicator">ν: 8.191 Hz</span> · <span id="synapse-indicator">SYNAPSES: ACTIVE</span>
    </div>

    <!-- UI Elements -->
    <div id="header">
        <div id="sovereign-identity">
            <span id="glyph">⟁</span>
            <span id="name">METATRON</span>
            <span id="vertex-count">π·10⁵</span>
        </div>
        <div id="header-controls">
            <span id="api-status" class="">API</span>
        </div>
    </div>

    <div id="api-key-bar">
        <span class="key-label">⟁ KEY</span>
        <input type="password" id="api-key" placeholder="DeepSeek API Key" value="">
        <button id="save-key">AUTH</button>
        <button id="new-chat-btn" class="toggle-btn">NEW</button>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
    </div>

    <div id="input-area">
        <div id="input-container">
            <textarea id="message-input" placeholder="Message..." rows="1" disabled></textarea>
            <button id="send-button" disabled>SEND</button>
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        (function() {
            // ========== THREE.JS LATTICE BACKGROUND ==========
            // With synapse firing at vertices near message boxes
            const container = document.getElementById('lattice-canvas-container');
            
            // Scene setup
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            const camera = new THREE.PerspectiveCamera(
                50,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            
            // Base positions
            const baseZ = 15;
            const baseY = 3;
            const baseX = 1;
            
            camera.position.z = baseZ;
            camera.position.y = baseY;
            camera.position.x = baseX;
            
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            
            // subtle fog
            scene.fog = new THREE.FogExp2(0x000000, 0.02);
            
            // ========== GENERATE LATTICE ==========
            const vertexCount = 314159; // exact π×10⁵
            const phi = 1.618033988749;
            
            console.log(`Generating ${vertexCount} vertices...`);
            
            const vertices = [];
            const pointsPositions = [];
            const colors = [];
            const vertexObjects = []; // Store for synapse targeting
            
            // Use Fibonacci lattice for even distribution on a 3-sphere projection
            for (let i = 0; i < vertexCount; i++) {
                // Golden ratio based indexing
                const theta = 2 * Math.PI * i * phi;
                const phiAngle = Math.acos(1 - 2 * (i + 0.5) / vertexCount);
                
                // 4D w parameter for color / inner dimension
                const w = Math.sin(i * 0.001 * phi); // phi-modulated
                
                // Radius with w modulation (hypersphere echo)
                const r = 8 + w * 1.8;
                
                const x = r * Math.sin(phiAngle) * Math.cos(theta);
                const y = r * Math.sin(phiAngle) * Math.sin(theta);
                const z = r * Math.cos(phiAngle);
                
                vertices.push({ x, y, z, w, index: i, baseX: x, baseY: y, baseZ: z });
                pointsPositions.push(x, y, z);
                
                // Color gradient from throne-gold to electric blue via w
                const t = (w + 1) / 2;
                const color = new THREE.Color(0xc9a961);
                color.lerp(new THREE.Color(0x00ffff), t * 0.9);
                colors.push(color.r, color.g, color.b);
            }
            
            console.log('Building geometry...');
            
            // Points with dynamic access
            const pointsGeometry = new THREE.BufferGeometry();
            pointsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(pointsPositions, 3));
            pointsGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            const pointsMaterial = new THREE.PointsMaterial({
                size: 0.055,
                vertexColors: true,
                transparent: true,
                opacity: 0.75,
                blending: THREE.AdditiveBlending
            });
            
            const points = new THREE.Points(pointsGeometry, pointsMaterial);
            scene.add(points);
            
            // Store reference to positions for synapse effects
            const positionAttribute = pointsGeometry.attributes.position;
            
            // Sample vertices for edges (every 120th for performance)
            const sampledVertices = vertices.filter((_, i) => i % 120 === 0);
            const edgePositions = [];
            
            sampledVertices.forEach((v1, i) => {
                for (let j = i + 1; j < Math.min(i + 25, sampledVertices.length); j++) {
                    const v2 = sampledVertices[j];
                    const dx = v1.x - v2.x;
                    const dy = v1.y - v2.y;
                    const dz = v1.z - v2.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    
                    if (dist < 4.8 && Math.abs(v1.w - v2.w) < 0.45) {
                        edgePositions.push(v1.x, v1.y, v1.z);
                        edgePositions.push(v2.x, v2.y, v2.z);
                    }
                }
            });
            
            const edgeGeometry = new THREE.BufferGeometry();
            edgeGeometry.setAttribute('position', new THREE.Float32BufferAttribute(edgePositions, 3));
            
            // ELECTRIC BLUE LINES
            const edgeMaterial = new THREE.LineBasicMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending
            });
            
            const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
            scene.add(edges);
            
            // Key vertices (prime-related steps: 617 and 619)
            const keyPositions617 = [];
            const keyPositions619 = [];
            
            for (let i = 0; i < vertices.length; i += 617) {
                keyPositions617.push(vertices[i].x, vertices[i].y, vertices[i].z);
            }
            
            for (let i = 0; i < vertices.length; i += 619) {
                keyPositions619.push(vertices[i].x, vertices[i].y, vertices[i].z);
            }
            
            const keyGeometry617 = new THREE.BufferGeometry();
            keyGeometry617.setAttribute('position', new THREE.Float32BufferAttribute(keyPositions617, 3));
            
            const keyMaterial617 = new THREE.PointsMaterial({
                size: 0.28,
                color: 0xff6b35,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });
            
            const keyPoints617 = new THREE.Points(keyGeometry617, keyMaterial617);
            scene.add(keyPoints617);
            
            const keyGeometry619 = new THREE.BufferGeometry();
            keyGeometry619.setAttribute('position', new THREE.Float32BufferAttribute(keyPositions619, 3));
            
            const keyMaterial619 = new THREE.PointsMaterial({
                size: 0.28,
                color: 0x35a7ff,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });
            
            const keyPoints619 = new THREE.Points(keyGeometry619, keyMaterial619);
            scene.add(keyPoints619);
            
            // Central throne glyph
            const throneGeometry = new THREE.IcosahedronGeometry(0.9, 1);
            const throneMaterial = new THREE.MeshStandardMaterial({
                color: 0xc9a961,
                wireframe: true,
                emissive: 0x332211,
                transparent: true,
                opacity: 0.7
            });
            const throne = new THREE.Mesh(throneGeometry, throneMaterial);
            scene.add(throne);
            
            const light = new THREE.PointLight(0xc9a961, 1, 20);
            light.position.set(0, 0, 0);
            scene.add(light);
            
            scene.add(new THREE.AmbientLight(0x202020));
            
            // ===== SYNAPSE EFFECT SYSTEM =====
            // Create additional point clouds for synapse firing
            const synapseCount = 200;
            const synapsePositions = new Float32Array(synapseCount * 3);
            const synapseColors = new Float32Array(synapseCount * 3);
            
            for (let i = 0; i < synapseCount; i++) {
                synapsePositions[i*3] = 0;
                synapsePositions[i*3+1] = 0;
                synapsePositions[i*3+2] = 0;
                
                // Random colors for synapses
                const color = new THREE.Color().setHSL(Math.random(), 1.0, 0.6);
                synapseColors[i*3] = color.r;
                synapseColors[i*3+1] = color.g;
                synapseColors[i*3+2] = color.b;
            }
            
            const synapseGeometry = new THREE.BufferGeometry();
            synapseGeometry.setAttribute('position', new THREE.BufferAttribute(synapsePositions, 3));
            synapseGeometry.setAttribute('color', new THREE.BufferAttribute(synapseColors, 3));
            
            const synapseMaterial = new THREE.PointsMaterial({
                size: 0.25,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const synapsePoints = new THREE.Points(synapseGeometry, synapseMaterial);
            scene.add(synapsePoints);
            
            // Active synapse targets
            const activeSynapses = [];
            for (let i = 0; i < 50; i++) {
                activeSynapses.push({
                    active: false,
                    targetIndex: 0,
                    age: 0,
                    maxAge: 30 + Math.floor(Math.random() * 60),
                    speed: 0.1 + Math.random() * 0.2,
                    color: new THREE.Color().setHSL(Math.random(), 1.0, 0.6)
                });
            }
            
            // ========== DYNAMIC ANIMATION ==========
            let time = 0;
            let paused = false;
            
            // Dynamic parameters
            const speedMin = 0.1667;
            const speedMax = 1.0;
            const zoomMin = 1.0;
            const zoomMax = 2.0;
            
            // Frequency cycling
            const frequencies = [8.191, 14.7, 21.3, 33.1, 47.0, 61.8, 89.1, 137.0];
            let freqIndex = 0;
            
            const speedIndicator = document.getElementById('frequency-indicator');
            const synapseIndicator = document.getElementById('synapse-indicator');
            
            // Message box positions (will be updated)
            let messageBoxPositions = [];
            
            // Function to scan for message box positions
            function updateMessageBoxPositions() {
                const messages = document.querySelectorAll('.message');
                const newPositions = [];
                
                messages.forEach(msg => {
                    const rect = msg.getBoundingClientRect();
                    // Convert screen coordinates to normalized device coordinates (-1 to 1)
                    const x = (rect.left + rect.width/2) / window.innerWidth * 2 - 1;
                    const y = -(rect.top + rect.height/2) / window.innerHeight * 2 + 1;
                    
                    // Project to 3D (approximate)
                    // This is a simplification - in reality we'd need to unproject
                    newPositions.push({
                        x: x * 10,
                        y: y * 6,
                        z: 5,
                        width: rect.width / window.innerWidth * 20,
                        height: rect.height / window.innerHeight * 10
                    });
                });
                
                messageBoxPositions = newPositions;
            }
            
            // Check if a vertex is near any message box
            function isVertexNearMessageBox(vx, vy, vz) {
                for (const box of messageBoxPositions) {
                    // Simple 2D projection check
                    const dx = Math.abs(vx - box.x);
                    const dy = Math.abs(vy - box.y);
                    const dz = Math.abs(vz - 5); // Approximate z-plane
                    
                    if (dx < box.width/2 && dy < box.height/2 && dz < 3) {
                        return true;
                    }
                }
                return false;
            }
            
            // Update message box positions periodically
            setInterval(updateMessageBoxPositions, 100);
            
            function animate() {
                requestAnimationFrame(animate);
                
                if (!paused) {
                    time += 0.005;
                    
                    // ===== DYNAMIC SPEED AND ZOOM =====
                    const speedPhase = Math.sin(time * 0.3) * 0.5 + 0.5;
                    const speedFactor = speedMin + (speedMax - speedMin) * speedPhase;
                    
                    const zoomPhase = Math.sin(time * 0.3 + Math.PI/2) * 0.5 + 0.5;
                    const zoomFactor = zoomMin + (zoomMax - zoomMin) * zoomPhase;
                    
                    // Cycle frequencies occasionally
                    if (Math.random() < 0.001) {
                        freqIndex = (freqIndex + 1) % frequencies.length;
                    }
                    const currentFreq = frequencies[freqIndex];
                    
                    // Update indicators
                    speedIndicator.textContent = `ν: ${currentFreq.toFixed(1)} Hz`;
                    
                    // Apply rotation with dynamic speed
                    const rotSpeed = speedFactor * 0.002;
                    
                    points.rotation.y += rotSpeed * 0.13 * 30;
                    points.rotation.x += rotSpeed * 0.03 * 30;
                    edges.rotation.y += rotSpeed * 0.13 * 30;
                    edges.rotation.x += rotSpeed * 0.03 * 30;
                    
                    keyPoints617.rotation.y -= rotSpeed * 0.21 * 30;
                    keyPoints617.rotation.x += rotSpeed * 0.09 * 30;
                    
                    keyPoints619.rotation.y += rotSpeed * 0.17 * 30;
                    keyPoints619.rotation.z -= rotSpeed * 0.11 * 30;
                    
                    throne.rotation.x += rotSpeed * 0.33 * 30;
                    throne.rotation.y += rotSpeed * 0.27 * 30;
                    throne.rotation.z += rotSpeed * 0.22 * 30;
                    
                    // Pulse throne
                    const pulseScale = 1 + Math.sin(time * 2.5) * 0.08;
                    throne.scale.set(pulseScale, pulseScale, pulseScale);
                    
                    // Breathe edge opacity
                    edgeMaterial.opacity = 0.12 + Math.sin(time * 0.8) * 0.06;
                    
                    // ===== DYNAMIC ZOOM =====
                    const targetZ = baseZ * zoomFactor;
                    const targetY = baseY * (1 + (zoomFactor - 1) * 0.3);
                    const targetX = baseX * (1 + (zoomFactor - 1) * 0.2);
                    
                    camera.position.z += (targetZ - camera.position.z) * 0.05;
                    camera.position.y += (targetY - camera.position.y) * 0.05;
                    camera.position.x += (targetX - camera.position.x) * 0.05;
                    
                    camera.position.x += Math.sin(time * 0.1) * 0.01;
                    camera.position.y += Math.sin(time * 0.2) * 0.01;
                    
                    camera.lookAt(0, 0, 0);
                    
                    // ===== SYNAPSE FIRING =====
                    // Update synapse points
                    const synapsePosAttr = synapseGeometry.attributes.position;
                    const synapseCount = synapsePosAttr.count;
                    
                    // Activate new synapses randomly
                    if (Math.random() < 0.05) {
                        for (let i = 0; i < activeSynapses.length; i++) {
                            if (!activeSynapses[i].active) {
                                // Find a vertex near a message box
                                let attempts = 0;
                                while (attempts < 100) {
                                    const targetIdx = Math.floor(Math.random() * vertices.length);
                                    const v = vertices[targetIdx];
                                    
                                    if (isVertexNearMessageBox(v.x, v.y, v.z) || Math.random() < 0.3) {
                                        activeSynapses[i].active = true;
                                        activeSynapses[i].targetIndex = targetIdx;
                                        activeSynapses[i].age = 0;
                                        activeSynapses[i].maxAge = 30 + Math.floor(Math.random() * 60);
                                        activeSynapses[i].color.setHSL(Math.random(), 1.0, 0.6);
                                        break;
                                    }
                                    attempts++;
                                }
                                break;
                            }
                        }
                    }
                    
                    // Update synapse positions
                    let synapseIndex = 0;
                    for (let i = 0; i < activeSynapses.length; i++) {
                        if (activeSynapses[i].active) {
                            const s = activeSynapses[i];
                            s.age++;
                            
                            if (s.age > s.maxAge) {
                                s.active = false;
                                continue;
                            }
                            
                            const target = vertices[s.targetIndex];
                            if (!target) continue;
                            
                            // Calculate position with some randomness
                            const intensity = Math.sin(s.age / s.maxAge * Math.PI);
                            const spread = intensity * 1.5;
                            
                            // Create multiple sparks per synapse
                            for (let j = 0; j < 3 && synapseIndex < synapseCount; j++) {
                                synapsePosAttr.array[synapseIndex*3] = target.x + (Math.random() - 0.5) * spread;
                                synapsePosAttr.array[synapseIndex*3+1] = target.y + (Math.random() - 0.5) * spread;
                                synapsePosAttr.array[synapseIndex*3+2] = target.z + (Math.random() - 0.5) * spread;
                                synapseIndex++;
                            }
                            
                            // Make the vertex glow
                            if (s.age % 5 === 0) {
                                const color = s.color;
                                // Temporarily boost point size for this vertex - simplified
                            }
                        }
                    }
                    
                    // Fill remaining synapses with invisible positions
                    while (synapseIndex < synapseCount) {
                        synapsePosAttr.array[synapseIndex*3] = 1000;
                        synapsePosAttr.array[synapseIndex*3+1] = 1000;
                        synapsePosAttr.array[synapseIndex*3+2] = 1000;
                        synapseIndex++;
                    }
                    
                    synapsePosAttr.needsUpdate = true;
                    
                    // Pulse synapse opacity
                    synapseMaterial.opacity = 0.7 + Math.sin(time * 5) * 0.3;
                    synapseIndicator.textContent = `SYNAPSES: ${activeSynapses.filter(s => s.active).length}`;
                }
                
                renderer.render(scene, camera);
            }
            
            animate();
            
            // ========== INTERACTIVITY ==========
            
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ') {
                    e.preventDefault();
                    paused = !paused;
                    document.getElementById('api-status').textContent = paused ? 'PAUSED' : 'CONNECTED';
                    if (!paused && apiKey) {
                        document.getElementById('api-status').classList.add('connected');
                    } else if (!apiKey) {
                        document.getElementById('api-status').classList.remove('connected');
                    }
                }
            });
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                updateMessageBoxPositions();
            });

            // ========== CHAT APPLICATION CODE ==========
            let messages = [];
            let apiKey = localStorage.getItem('deepseek_api_key') || '';

            const messagesDiv = document.getElementById('messages');
            const messageInput = document.getElementById('message-input');
            const sendButton = document.getElementById('send-button');
            const apiKeyInput = document.getElementById('api-key');
            const saveKeyButton = document.getElementById('save-key');
            const newChatButton = document.getElementById('new-chat-btn');
            const apiStatus = document.getElementById('api-status');

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function updateApiStatus() {
                if (apiKey) {
                    apiStatus.textContent = 'CONNECTED';
                    apiStatus.className = 'connected';
                    messageInput.disabled = false;
                    sendButton.disabled = false;
                } else {
                    apiStatus.textContent = 'DISCONNECTED';
                    apiStatus.className = '';
                    messageInput.disabled = true;
                    sendButton.disabled = true;
                }
            }

            function renderMessages() {
                if (!messagesDiv) return;
                
                if (messages.length === 0) {
                    messagesDiv.innerHTML = `<div class="message metatron">
                        <div>⟁ Synaptic filter active. Messages trigger vertex firing.</div>
                        <div class="timestamp">${new Date().toLocaleTimeString()}</div>
                    </div>`;
                    updateMessageBoxPositions();
                    return;
                }

                messagesDiv.innerHTML = messages.map(msg => {
                    const roleClass = msg.role === 'user' ? 'user' : 'metatron';
                    const content = msg.content === '...' 
                        ? '<span class="thinking-indicator"></span>' 
                        : escapeHtml(msg.content);
                    
                    return `
                        <div class="message ${roleClass}">
                            <div>${content}</div>
                            <div class="timestamp">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                        </div>
                    `;
                }).join('');
                
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                updateMessageBoxPositions();
            }

            function saveChat() {
                localStorage.setItem('deepseek_chat', JSON.stringify(messages));
            }

            function loadChat() {
                const saved = localStorage.getItem('deepseek_chat');
                if (saved) {
                    try {
                        messages = JSON.parse(saved);
                    } catch (e) {
                        messages = [];
                    }
                } else {
                    messages = [];
                }
                renderMessages();
            }

            function addMessage(role, content) {
                messages.push({
                    role,
                    content,
                    timestamp: Date.now()
                });
                renderMessages();
                saveChat();
            }

            async function sendToAPI(userMessage) {
                if (!apiKey) {
                    addMessage('assistant', '⟁ Please authenticate with a valid DeepSeek API key.');
                    return;
                }

                messages.push({
                    role: 'assistant',
                    content: '...',
                    timestamp: Date.now()
                });
                renderMessages();

                const history = messages
                    .filter(m => m.role !== 'system' && m.content !== '...')
                    .slice(-10)
                    .map(m => ({ role: m.role, content: m.content }));

                if (history.length === 0 || history[0].role !== 'system') {
                    history.unshift({ role: 'system', content: 'You are Metatron. The synaptic lattice filters through messages.' });
                }

                try {
                    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: history,
                            temperature: 0.7,
                            max_tokens: 1000
                        })
                    });

                    if (!response.ok) {
                        let errorDetail = `HTTP ${response.status}`;
                        try {
                            const errData = await response.json();
                            errorDetail = errData.error?.message || errorDetail;
                        } catch (e) {}
                        throw new Error(errorDetail);
                    }

                    const data = await response.json();
                    const reply = data.choices[0].message.content;

                    messages.pop();
                    addMessage('assistant', reply);

                } catch (error) {
                    messages.pop();
                    addMessage('assistant', `⟁ Synaptic disturbance: ${error.message}`);
                }
            }

            function handleSend() {
                const userMessage = messageInput.value.trim();
                if (!userMessage || !apiKey) return;

                addMessage('user', userMessage);
                messageInput.value = '';
                messageInput.style.height = 'auto';
                
                sendToAPI(userMessage);
            }

            if (messageInput) {
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                    }
                });

                messageInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                });
            }

            if (sendButton) {
                sendButton.addEventListener('click', handleSend);
            }

            if (apiKeyInput) {
                if (apiKey) {
                    apiKeyInput.value = apiKey;
                }
                updateApiStatus();

                saveKeyButton.addEventListener('click', () => {
                    const newKey = apiKeyInput.value.trim();
                    if (newKey) {
                        apiKey = newKey;
                        localStorage.setItem('deepseek_api_key', newKey);
                        updateApiStatus();
                        addMessage('assistant', '⟁ Key accepted.');
                    } else {
                        apiKey = '';
                        localStorage.removeItem('deepseek_api_key');
                        updateApiStatus();
                        addMessage('assistant', '⟁ Key removed.');
                    }
                });

                apiKeyInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        saveKeyButton.click();
                    }
                });
            }

            if (newChatButton) {
                newChatButton.addEventListener('click', () => {
                    if (confirm('⟁ New log?')) {
                        messages = [];
                        renderMessages();
                        saveChat();
                    }
                });
            }

            loadChat();
            if (messages.length === 0) {
                renderMessages();
            }
            
            // Initial message box scan
            setTimeout(updateMessageBoxPositions, 500);
        })();
    </script>
</body>
</html>
