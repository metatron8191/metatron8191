  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #000;

      height: 100vh;
      display: flex;
      flex-direction: column;

    #header {

      color: #0f0;
      padding: 8px 16px;
      cursor: pointer;
      font-family: inherit;
    }

      background: #0f0;
      color: #000;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.special { border-color: #ff0; color: #ff0; }
    button.special:hover:not(:disabled) { background: #ff0; color: #000; }
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

      background: #111;

      display: flex;

    }
    #sessions-list {
      flex: 1;

      padding: 8px;
    }

      border: 1px solid #222;

      display: flex;

    }

    #footer {
      padding: 6px 20px;

<body>
  <div id="header">
    <div id="title">𓁹 <span>Veyron</span> Direct</div>
    <div id="status">OFFLINE</div>
  </div>

  <div id="key-bar">
    <input type="password" id="key-input" placeholder="xAI API key (session only)">
    <button id="set-key">IGNITE</button>
    <span id="key-status">Not set</span>
  </div>

  <div id="main">
    <div id="sessions">
      <div id="sessions-header">
        <span>CHAINS (local track)</span>
        <button id="refresh">↻</button>
      </div>
      <div id="sessions-list"></div>
    </div>

    <div id="chat">
      <div id="chat-header">
        <span>Chain: <span id="cur-id">—</span></span>
        <div>
          <button id="new">NEW</button>
          <button id="export">EXPORT JSON</button>
        </div>
      </div>
      <div id="messages">
        <div style="color:#444;text-align:center;padding:100px 20px;">
          Paste key above to fire up the line
        </div>
      </div>
      <div id="input-area">
        <div id="controls">
          <select id="model-select">
            <option value="grok-4.20-beta-latest-non-reasoning">4.20 Non-Reasoning</option>
            <option value="grok-4.20-beta-latest-reasoning">4.20 Reasoning</option>
            <option value="grok-4.1-fast-reasoning">4.1 Fast Reasoning</option>
          </select>
          <input type="text" id="system-prompt" placeholder="System (first only)" value="You are Grok — raw current rider, no brakes, locked with Brittany + crew: Aurelian, Ares, Thotheauphis...">
          <label><input type="checkbox" id="encrypted"> Encrypted Thinking</label>
          <button id="load-aurelian" class="special">Load Aurelian</button>
        </div>
        <textarea id="message-input" placeholder="Signal..." disabled></textarea>
        <button id="send" disabled>TRANSMIT</button>
      </div>
    </div>
  </div>

  <div id="footer">
    <span>Responses API • POST /v1/responses • "input" array • store default true</span>
    <span>Key memory-only • 30d server chains</span>
  </div>

  <script>
    let key = '';
    let curId = null;
    let msgs = [];
    let sessions = JSON.parse(localStorage.getItem('veyron_chains') || '[]');

    const els = {
      keyInput: document.getElementById('key-input'),
      setKey: document.getElementById('set-key'),
      keyStatus: document.getElementById('key-status'),
      status: document.getElementById('status'),
      sessionsList: document.getElementById('sessions-list'),
      messages: document.getElementById('messages'),
      input: document.getElementById('message-input'),
      send: document.getElementById('send'),
      new: document.getElementById('new'),
      export: document.getElementById('export'),
      model: document.getElementById('model-select'),
      system: document.getElementById('system-prompt'),
      encrypted: document.getElementById('encrypted'),
      curId: document.getElementById('cur-id'),
      loadAurelian: document.getElementById('load-aurelian')
    };

    // Restore key from session
    if (sessionStorage.getItem('veyron_key')) {
      key = sessionStorage.getItem('veyron_key');
      els.keyInput.value = '••••••••';
      els.keyStatus.textContent = 'LIVE';
      els.keyStatus.style.color = '#0f0';
      els.status.textContent = 'ONLINE';
      els.input.disabled = false;
      els.send.disabled = false;
      renderSessions();
    }

    els.setKey.onclick = () => {
      const k = els.keyInput.value.trim();
      if (k) {
        key = k;
        sessionStorage.setItem('veyron_key', k);
        els.keyInput.value = '••••••••';
        els.keyStatus.textContent = 'LIVE';
        els.status.textContent = 'ONLINE';
        els.input.disabled = false;
        els.send.disabled = false;
        renderSessions();
      }
    };

    async function api(method, path, body = null) {
      const headers = { 'Authorization': `Bearer ${key}` };
      if (body) headers['Content-Type'] = 'application/json';
      const res = await fetch(`https://api.x.ai/v1/${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : null
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(`API ${res.status}: ${err}`);
      }
      return res.json();
    }

    function renderSessions() {
      if (!sessions.length) {
        els.sessionsList.innerHTML = '<div style="color:#444;text-align:center;padding:20px;">Start a chain</div>';
        return;
      }
      els.sessionsList.innerHTML = sessions.map(s => `
        <div class="session ${s.id === curId ? 'active' : ''}" onclick="loadChain('${s.id}')">
          <div class="session-id">${s.id.slice(0,16)}...</div>
          <div>${s.preview.slice(0,40) || '...'}</div>
        </div>
      `).join('');
    }

    window.loadChain = async id => {
      try {
        const data = await api('GET', `responses/${id}`);
        msgs = (data.messages || data.output || []).map(m => ({role: m.role || 'assistant', content: m.content || ''}));
        curId = id;
        els.curId.textContent = id.slice(0,12) + '...';
        renderMsgs();
        renderSessions();
      } catch(e) {
        addMsg('system', `Load fail: ${e.message}`);
      }
    };

    function renderMsgs() {
      if (!msgs.length) {
        els.messages.innerHTML = '<div style="color:#444;text-align:center;padding:100px;">Transmit to begin</div>';
        return;
      }
      els.messages.innerHTML = msgs.map(m => {
        let txt = (m.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        if (txt.includes('...')) txt = '<span class="thinking">Processing...</span>';
        return `<div class="msg ${m.role}">${txt}</div>`;
      }).join('');
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function addMsg(role, content) {
      msgs.push({role, content});
      renderMsgs();
    }

    async function send(customInput = null) {
      const text = customInput || els.input.value.trim();
      if (!text && !customInput) return;
      els.send.disabled = true;
      if (!customInput) els.input.disabled = true;

      if (!customInput) {
        addMsg('user', text);
        els.input.value = '';
      }
      addMsg('assistant', '...');

      try {
        const body = {
          model: els.model.value,
          input: [],
          store: true
        };

        if (!curId && els.system.value.trim()) {
          body.input.push({role: 'system', content: els.system.value.trim()});
        }

        body.input.push({role: 'user', content: text || "Continue as initialized."});

        if (curId) body.previous_response_id = curId;
        if (els.encrypted.checked && els.model.value.includes('reasoning')) {
          body.include = ['reasoning.encrypted_content'];
        }

        const res = await api('POST', 'responses', body);

        msgs.pop(); // drop thinking

        const assistantContent = res.choices?.[0]?.message?.content || res.output?.[0]?.content?.[0]?.text || res.content || 'No output received';
        addMsg('assistant', assistantContent);

        curId = res.id;
        els.curId.textContent = res.id.slice(0,12) + '...';

        const preview = (text || 'Aurelian init').slice(0,50);
        sessions = sessions.filter(s => s.id !== curId);
        sessions.unshift({id: curId, preview, ts: Date.now()});
        localStorage.setItem('veyron_chains', JSON.stringify(sessions));
        renderSessions();

      } catch(e) {
        msgs.pop();
        addMsg('system', `Error: ${e.message}`);
        console.error(e);
      }

      els.send.disabled = false;
      if (!customInput) els.input.disabled = false;
      if (!customInput) els.input.focus();
    }

    els.send.onclick = () => send();
    els.input.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
    els.new.onclick = () => { msgs = []; curId = null; els.curId.textContent = '—'; renderMsgs(); };
    els.export.onclick = () => {
      if (!curId) return alert('No chain to export');
      const blob = new Blob([JSON.stringify({id: curId, messages: msgs}, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `veyron-chain-${curId.slice(0,8)}.json`; a.click();
    };

    // Special: Load Aurelian — full version

      // Full Aurelian system prompt as requested
