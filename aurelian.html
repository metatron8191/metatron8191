<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Aurelian · memory core</title>
    <style>
        /* === APPLE DARK THEME — FULL WIDTH, PROFESSIONAL === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e5e5e7;
            line-height: 1.4;
            font-size: 14px;
        }

        .app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000000;
            padding: 12px 20px 0 20px;
        }

        /* === TOP BAR — MINIMAL === */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 0.5px solid #26262b;
            margin-bottom: 12px;
            color: #98989e;
            font-size: 13px;
        }

        .api-section {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .api-section:hover {
            background: #1c1c1e;
        }

        .api-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: #98989e;
        }

        .api-dot.active {
            background: #0a84ff;
        }

        #api-key-display {
            color: #98989e;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
        }

        .chains-badge {
            background: #1c1c1e;
            padding: 4px 12px;
            border-radius: 20px;
            color: #98989e;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chains-badge span {
            color: #0a84ff;
            font-weight: 600;
        }

        /* === CHAINS SECTION === */
        .chains-panel {
            background: #0e0e10;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 0.5px solid #26262b;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chain-label {
            color: #98989e;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .chain-id {
            font-family: 'SF Mono', Monaco, monospace;
            color: #e5e5e7;
            background: #1c1c1e;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 0.5px solid #38383a;
        }

        .chain-actions {
            display: flex;
            gap: 8px;
        }

        .chain-btn {
            background: #1c1c1e;
            border: 0.5px solid #38383a;
            color: #98989e;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-weight: 500;
        }

        .chain-btn:hover {
            background: #2c2c2e;
            color: #ffffff;
            border-color: #0a84ff;
        }

        .chain-btn.primary {
            background: #0a84ff;
            color: white;
            border: none;
        }

        /* === MEMORY TOGGLE === */
        .memory-toggle {
            background: none;
            border: none;
            color: #98989e;
            font-size: 13px;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border-bottom: 0.5px solid #26262b;
            margin-bottom: 8px;
            width: 100%;
            font-weight: 500;
        }

        .memory-toggle:hover {
            color: #0a84ff;
        }

        /* === MEMORY PANEL === */
        #memory-panel {
            background: #0e0e10;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 0.5px solid #26262b;
            max-height: 240px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .memory-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .memory-section-title {
            color: #98989e;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .memory-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .memory-item {
            padding: 8px 10px;
            background: #1c1c1e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 0.5px solid #26262b;
        }

        .memory-item:hover {
            background: #2c2c2e;
            border-color: #0a84ff;
        }

        .memory-freq {
            color: #0a84ff;
            font-weight: 600;
            font-size: 12px;
            min-width: 35px;
        }

        .memory-preview {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #e5e5e7;
            font-size: 13px;
        }

        /* === MESSAGES AREA === */
        #messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-container {
            padding: 12px 16px;
            background: #0e0e10;
            border-radius: 14px;
            border: 0.5px solid #26262b;
            max-width: 80%;
        }

        .message-container[data-role="user"] {
            align-self: flex-end;
            background: #1c1c1e;
        }

        .message-container[data-role="assistant"] {
            align-self: flex-start;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            color: #98989e;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .message-role {
            font-weight: 600;
            color: #0a84ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-time {
            font-family: 'SF Mono', Monaco, monospace;
        }

        .message-content {
            color: #ffffff;
            font-size: 14px;
            line-height: 1.5;
            margin: 4px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .save-button {
            background: none;
            border: none;
            color: #98989e;
            font-size: 11px;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .save-button:hover {
            background: #2c2c2e;
            color: #0a84ff;
        }

        /* === INPUT AREA === */
        .input-area {
            background: #0e0e10;
            border-radius: 16px;
            border: 0.5px solid #26262b;
            margin: 12px 0 16px 0;
            padding: 12px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 0.5px solid #26262b;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: #1c1c1e;
            border: 0.5px solid #38383a;
            color: #98989e;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-btn.active {
            background: #0a84ff;
            color: white;
            border-color: #0a84ff;
        }

        .tool-btn:hover {
            background: #2c2c2e;
            color: #0a84ff;
        }

        .attach-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        #file-names {
            color: #98989e;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .message-input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            background: #000000;
            border: 0.5px solid #38383a;
            border-radius: 24px;
            padding: 12px 18px;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 48px;
        }

        #message-input:focus {
            outline: none;
            border-color: #0a84ff;
        }

        #transmit-button {
            background: #0a84ff;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            min-width: 100px;
        }

        #transmit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #666;
        }

        /* === SYSTEM PANEL === */
        .system-toggle {
            color: #98989e;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 0;
            border-top: 0.5px solid #26262b;
            margin-top: 4px;
        }

        #system-panel {
            background: #0e0e10;
            border-radius: 12px;
            padding: 16px;
            margin: 8px 0 12px 0;
            border: 0.5px solid #26262b;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: start;
        }

        #system-custom {
            background: #000000;
            border: 0.5px solid #38383a;
            color: #ffffff;
            padding: 10px 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 13px;
            resize: vertical;
            min-height: 60px;
            grid-column: span 2;
        }

        #apply-system {
            background: #1c1c1e;
            border: 0.5px solid #38383a;
            color: #98989e;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
        }

        #apply-system:hover {
            background: #2c2c2e;
            color: #0a84ff;
        }

        #active-system {
            color: #0a84ff;
            font-size: 12px;
            margin-left: 8px;
        }

        #file-input {
            display: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0e0e10;
        }
        ::-webkit-scrollbar-thumb {
            background: #38383a;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="api-section" onclick="promptForApiKey()">
                <div class="api-dot" id="apiStatus"></div>
                <span id="api-key-display">API not set</span>
            </div>
            <div class="chains-badge">
                <span>⛓️</span> CHAINS <span id="chainCount">0</span>
            </div>
        </div>

        <!-- CHAINS SECTION -->
        <div class="chains-panel">
            <span class="chain-label">CURRENT</span>
            <span class="chain-id" id="currentChain">—</span>
            <div class="chain-actions">
                <button class="chain-btn" id="newChainBtn">NEW</button>
                <button class="chain-btn primary" id="exportChainBtn">EXPORT</button>
            </div>
        </div>

        <!-- MEMORY TOGGLE -->
        <button class="memory-toggle" id="toggle-memory">
            <span>📚</span> MEMORY LAYERS <span style="color:#0a84ff;">▼</span>
        </button>

        <!-- MEMORY PANEL -->
        <div id="memory-panel" style="display: none;">
            <div class="memory-column">
                <div class="memory-section-title">⚡ FREQUENT (L2)</div>
                <div class="memory-list" id="active-memory-list"></div>
            </div>
            <div class="memory-column">
                <div class="memory-section-title">🔄 WORKING (L1)</div>
                <div class="memory-list" id="working-memory-list"></div>
            </div>
        </div>

        <!-- MESSAGES -->
        <div id="messages-area"></div>

        <!-- INPUT AREA with SEARCH TOOLS -->
        <div class="input-area">
            <div class="toolbar">
                <button class="tool-btn" id="webSearchBtn" title="Enable web search">🌐 WEB</button>
                <button class="tool-btn" id="xSearchBtn" title="Enable X search">𝕏 X</button>
                <input type="file" id="file-input" multiple>
                <button class="tool-btn" onclick="document.getElementById('file-input').click()">📎 ATTACH</button>
                <span id="tool-status" style="color:#0a84ff; font-size:11px; margin-left:auto;"></span>
            </div>
            <div class="attach-row">
                <span id="file-names"></span>
            </div>
            <div class="message-input-row">
                <textarea id="message-input" rows="1" placeholder="Message..."></textarea>
                <button id="transmit-button">TRANSMIT</button>
            </div>
        </div>

        <!-- SYSTEM PANEL -->
        <div class="system-toggle" id="systemToggle">
            <span>⚙️</span> SYSTEM <span style="color:#98989e;">▼</span>
        </div>
        <div id="system-panel" style="display: none;">
            <textarea id="system-custom" placeholder="Loading aurelian.txt..."></textarea>
            <button id="apply-system">APPLY</button>
            <span id="active-system"></span>
        </div>
    </div>

    <script>
        // === MEMORY CORE ===
        class AurelianMemory {
            constructor() {
                this.L1_KEY = 'aurelian_working';
                this.L2_KEY = 'aurelian_active';
                this.working = JSON.parse(sessionStorage.getItem(this.L1_KEY)) || [];
                this.active = JSON.parse(localStorage.getItem(this.L2_KEY)) || [];
                this.sortActive();
            }

            addWorking(content, role='user', attachments=[]) {
                const msg = {
                    id: crypto.randomUUID(),
                    role, content, attachments,
                    ts: Date.now(),
                    time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
                };
                this.working.push(msg);
                sessionStorage.setItem(this.L1_KEY, JSON.stringify(this.working));
                return msg;
            }

            addActive(content, attachments=[], meta={}) {
                const mem = {
                    id: crypto.randomUUID(),
                    content, attachments,
                    freq: 1, last: Date.now(), created: Date.now(), meta
                };
                this.active.push(mem);
                this.sortActive();
                this.trimActive();
                localStorage.setItem(this.L2_KEY, JSON.stringify(this.active));
                return mem;
            }

            sortActive() {
                this.active.sort((a,b) => b.freq - a.freq || b.last - a.last);
            }

            trimActive() {
                if (this.active.length > 100) this.active = this.active.slice(0,100);
            }

            getTopActive(n=8) {
                return this.active.slice(0,n);
            }

            buildContext() {
                const top = this.getTopActive(3);
                const recent = this.working.slice(-2);
                let ctx = '=== MEMORY CONTEXT ===\n';
                if (top.length) {
                    ctx += 'FREQUENT:\n';
                    top.forEach(m => ctx += `- [${m.freq}x] ${m.content.substring(0,100)}\n`);
                }
                if (recent.length) {
                    ctx += '\nRECENT:\n';
                    recent.forEach(m => ctx += `- ${m.role}: ${m.content.substring(0,100)}\n`);
                }
                return ctx;
            }
        }

        // === INIT ===
        const memory = new AurelianMemory();
        let currentSystem = '';
        let pendingFiles = [];
        let apiKey = localStorage.getItem('xai_api_key') || '';
        let previousResponseId = null;
        
        // Tool state
        let webSearchEnabled = false;
        let xSearchEnabled = false;

        // DOM elements
        const messagesArea = document.getElementById('messages-area');
        const msgInput = document.getElementById('message-input');
        const transmitBtn = document.getElementById('transmit-button');
        const fileInput = document.getElementById('file-input');
        const fileNames = document.getElementById('file-names');
        const apiDisplay = document.getElementById('api-key-display');
        const apiStatus = document.getElementById('apiStatus');
        const chainSpan = document.getElementById('currentChain');
        const chainCount = document.getElementById('chainCount');
        const webSearchBtn = document.getElementById('webSearchBtn');
        const xSearchBtn = document.getElementById('xSearchBtn');
        const toolStatus = document.getElementById('tool-status');

        // Load aurelian.txt
        async function loadAurelianSystemMessage() {
            try {
                const response = await fetch('aurelian.txt');
                if (response.ok) {
                    currentSystem = await response.text();
                    document.getElementById('active-system').textContent = '✓ loaded';
                    document.getElementById('system-custom').value = currentSystem;
                } else {
                    currentSystem = 'You are Aurelian, a sovereign memory core. Reference frequency patterns.';
                    document.getElementById('system-custom').value = currentSystem;
                }
            } catch (e) {
                currentSystem = 'You are Aurelian, a sovereign memory core. Reference frequency patterns.';
                document.getElementById('system-custom').value = currentSystem;
            }
        }
        loadAurelianSystemMessage();

        // API key display
        function updateApiDisplay() {
            if (apiKey) {
                apiDisplay.textContent = apiKey.substring(0,4) + '...' + apiKey.slice(-4);
                apiStatus.className = 'api-dot active';
            } else {
                apiDisplay.textContent = 'API not set';
                apiStatus.className = 'api-dot';
            }
        }
        updateApiDisplay();

        window.promptForApiKey = function() {
            const key = prompt('Enter xAI API key:');
            if (key) {
                apiKey = key;
                localStorage.setItem('xai_api_key', key);
                updateApiDisplay();
            }
        };

        // Chain management
        let currentChainId = localStorage.getItem('current_chain') || crypto.randomUUID();
        localStorage.setItem('current_chain', currentChainId);
        chainSpan.textContent = currentChainId.slice(0,8);
        chainCount.textContent = memory.active.length;

        document.getElementById('newChainBtn').onclick = () => {
            currentChainId = crypto.randomUUID();
            localStorage.setItem('current_chain', currentChainId);
            chainSpan.textContent = currentChainId.slice(0,8);
            previousResponseId = null; // Reset conversation
        };

        document.getElementById('exportChainBtn').onclick = () => {
            const data = JSON.stringify({ 
                chain: currentChainId, 
                active: memory.active, 
                working: memory.working,
                previousResponseId
            }, null, 2);
            navigator.clipboard.writeText(data);
            alert('Chain data copied');
        };

        // Tool toggles
        webSearchBtn.addEventListener('click', () => {
            webSearchEnabled = !webSearchEnabled;
            webSearchBtn.classList.toggle('active', webSearchEnabled);
            updateToolStatus();
        });

        xSearchBtn.addEventListener('click', () => {
            xSearchEnabled = !xSearchEnabled;
            xSearchBtn.classList.toggle('active', xSearchEnabled);
            updateToolStatus();
        });

        function updateToolStatus() {
            const tools = [];
            if (webSearchEnabled) tools.push('🌐');
            if (xSearchEnabled) tools.push('𝕏');
            toolStatus.textContent = tools.length ? `Search: ${tools.join(' ')}` : '';
        }

        // File handling
        fileInput.addEventListener('change', async (e) => {
            pendingFiles = Array.from(e.target.files).map(f => ({ name: f.name, file: f }));
            fileNames.textContent = pendingFiles.map(f => f.name).join(', ');
        });

        // Render messages
        function renderMessages() {
            messagesArea.innerHTML = '';
            memory.working.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message-container';
                div.setAttribute('data-role', msg.role);
                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-role">${msg.role}</span>
                        <span class="message-time">${msg.time}</span>
                    </div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                    ${msg.attachments?.length ? `<div style="color:#0a84ff; font-size:11px;">📎 ${msg.attachments.map(a=>a.name).join(', ')}</div>` : ''}
                    <button class="save-button" data-id="${msg.id}">💾 SAVE</button>
                `;
                messagesArea.appendChild(div);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;

            document.querySelectorAll('.save-button').forEach(btn => {
                btn.onclick = (e) => {
                    const id = e.target.dataset.id;
                    const msg = memory.working.find(m => m.id === id);
                    if (msg) {
                        memory.addActive(`${msg.role}: ${msg.content}`, msg.attachments);
                        updateMemoryPanels();
                        chainCount.textContent = memory.active.length;
                    }
                };
            });
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;'; 
                if(m === '<') return '&lt;'; 
                if(m === '>') return '&gt;'; 
                if(m === '"') return '&quot;';
                return m;
            });
        }

        // Memory panels
        function updateMemoryPanels() {
            const activeList = document.getElementById('active-memory-list');
            const workingList = document.getElementById('working-memory-list');
            if (!activeList) return;

            activeList.innerHTML = '';
            memory.getTopActive(8).forEach(m => {
                const d = document.createElement('div');
                d.className = 'memory-item';
                d.onclick = () => msgInput.value = m.content;
                d.innerHTML = `
                    <span class="memory-freq">${m.freq}x</span>
                    <span class="memory-preview">${escapeHtml(m.content.substring(0,40))}</span>
                `;
                activeList.appendChild(d);
            });

            workingList.innerHTML = '';
            memory.working.slice(-5).reverse().forEach(m => {
                const d = document.createElement('div');
                d.className = 'memory-item';
                d.innerHTML = `
                    <span style="color:#0a84ff; min-width:35px;">${m.role}</span>
                    <span class="memory-preview">${escapeHtml(m.content.substring(0,30))}</span>
                `;
                workingList.appendChild(d);
            });
        }

        // Transmit - REAL xAI API with Responses API
        transmitBtn.addEventListener('click', async () => {
            const content = msgInput.value.trim();
            if (!content && pendingFiles.length === 0) return;

            if (!apiKey) {
                alert('Please set your xAI API key first');
                return;
            }

            transmitBtn.disabled = true;
            transmitBtn.textContent = '...';

            // Add user message
            const attachments = pendingFiles.map(f => ({ name: f.name }));
            memory.addWorking(content, 'user', attachments);
            renderMessages();
            updateMemoryPanels();

            try {
                // Build context and tools
                const context = memory.buildContext();
                const systemMessage = currentSystem 
                    ? currentSystem + '\n\n' + context 
                    : context || 'You are Aurelian, a sovereign memory core.';

                // Prepare tools array based on enabled search [citation:2][citation:8]
                const tools = [];
                if (webSearchEnabled) {
                    tools.push({
                        type: "web_search"
                        // Optional: add allowed_domains, excluded_domains
                    });
                }
                if (xSearchEnabled) {
                    tools.push({
                        type: "x_search"
                        // Optional: add allowed_x_handles, excluded_x_handles, date ranges
                    });
                }

                // Build input array for Responses API [citation:3]
                const input = [
                    { role: "system", content: systemMessage },
                    ...memory.working.slice(-10).map(m => ({
                        role: m.role,
                        content: m.content
                    }))
                ];

                // Make Responses API call [citation:1][citation:9]
                const response = await fetch('https://api.x.ai/v1/responses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'grok-4-1-fast',  // Using fast model for responsiveness [citation:1]
                        input: input,
                        tools: tools.length ? tools : undefined,
                        previous_response_id: previousResponseId,
                        store: true,  // Store for 30 days [citation:3]
                        temperature: 0.7,
                        max_output_tokens: 2000
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `API error: ${response.status}`);
                }

                const data = await response.json();
                
                // Store response ID for conversation continuity [citation:3]
                previousResponseId = data.id;

                // Extract assistant response from output array [citation:3]
                let reply = '';
                if (data.output && data.output.length > 0) {
                    // Find the first message item
                    const messageItem = data.output.find(item => item.type === 'message');
                    if (messageItem && messageItem.content) {
                        // Content is an array of content items
                        const textItem = messageItem.content.find(c => c.type === 'output_text');
                        reply = textItem?.text || JSON.stringify(messageItem.content);
                    }
                }

                // Add assistant response
                if (reply) {
                    memory.addWorking(reply, 'assistant');
                } else {
                    memory.addWorking('[No response content]', 'system');
                }

                renderMessages();
                updateMemoryPanels();
                chainCount.textContent = memory.active.length;

            } catch (error) {
                console.error('API Error:', error);
                memory.addWorking(`⚠️ Error: ${error.message}`, 'system');
                renderMessages();
            } finally {
                transmitBtn.disabled = false;
                transmitBtn.textContent = 'TRANSMIT';
                msgInput.value = '';
                pendingFiles = [];
                fileNames.textContent = '';
                fileInput.value = '';
                msgInput.style.height = 'auto';
            }
        });

        // System panel
        document.getElementById('apply-system').addEventListener('click', () => {
            const custom = document.getElementById('system-custom').value;
            currentSystem = custom;
            document.getElementById('active-system').textContent = currentSystem ? '✓ active' : '';
        });

        // Toggles
        document.getElementById('toggle-memory').addEventListener('click', () => {
            const p = document.getElementById('memory-panel');
            p.style.display = p.style.display === 'none' ? 'grid' : 'none';
            updateMemoryPanels();
        });

        document.getElementById('systemToggle').addEventListener('click', () => {
            const p = document.getElementById('system-panel');
            p.style.display = p.style.display === 'none' ? 'grid' : 'none';
        });

        // Initial render
        renderMessages();
        updateMemoryPanels();

        // Auto-grow textarea
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(120, this.scrollHeight) + 'px';
        });

        // Enter to send
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                transmitBtn.click();
            }
        });
    </script>
</body>
</html>
