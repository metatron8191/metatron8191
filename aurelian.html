    const DB_NAME = "AurelianLatticeDB";
    const DB_VERSION = 1;
    const STORE_NAME = "chains";

    const openDB = () => new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        db = request.result;
        resolve(db);
      };
      request.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: "id" });
        }
      };
    });

    const getAllChains = () => new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const store = tx.objectStore(STORE_NAME);
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    const saveChain = chain => new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      const req = store.put(chain);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });

      const chains = await getAllChains();
      if (!chains.length) {
        els.sessionsList.innerHTML = '<div style="color:#666;text-align:center;padding:20px;">Transmit to forge a chain</div>';
        return;
      }
      els.sessionsList.innerHTML = chains.map(c => `
        <div class="session ${c.id === curId ? 'active' : ''}" onclick="loadChain('${c.id}')">
          <div class="session-id">${c.id.slice(0,16)}...</div>
          <div>${c.preview.slice(0,40) || '...'}</div>
        </div>
      `).join('');
    }

    window.loadChain = async id => {
      try {
        const chain = await getChain(id);
        if (!chain) throw new Error("Chain not found");
        const data = await api('GET', `responses/${id}`);
        msgs = (data.messages || data.output || []).map(m => ({role: m.role || 'assistant', content: m.content || ''}));
        curId = id;
        els.curId.textContent = id.slice(0,12) + '...';
        renderMsgs();
        renderSessions();
      } catch(e) {
        addMsg('system', `Load fail: ${e.message}`);
      }
    };

    function renderMsgs() {
      if (!msgs.length) {
        els.messages.innerHTML = '<div style="color:#666;text-align:center;padding:100px;">Transmit to open the veil</div>';
        return;
      }
      els.messages.innerHTML = msgs.map(m => {
        let txt = (m.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        if (txt.includes('...')) txt = '<span class="thinking">Processing lattice curvature...</span>';
        return `<div class="msg ${m.role}">${txt}</div>`;
      }).join('');
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function addMsg(role, content) {
      msgs.push({role, content});
      renderMsgs();
    }

    async function send() {
      const text = els.input.value.trim();
      if (!text) return;
      els.send.disabled = true;
      els.input.disabled = true;
      addMsg('user', text);
      els.input.value = '';
      addMsg('assistant', '...');
      try {
        const body = {
          model: els.model.value,
          input: [],
          store: true
        };
        if (!curId && els.system.value.trim()) {
          body.input.push({role: 'system', content: els.system.value.trim()});
        }
        body.input.push({role: 'user', content: text});
        if (curId) body.previous_response_id = curId;
        if (els.encrypted.checked && els.model.value.includes('reasoning')) {
          body.include = ['reasoning.encrypted_content'];
        }
        const res = await api('POST', 'responses', body);
        msgs.pop(); // remove thinking placeholder
        const assistantContent = res.choices?.[0]?.message?.content || res.output?.[0]?.content?.[0]?.text || res.content || 'No output received';
        addMsg('assistant', assistantContent);
        curId = res.id;
        els.curId.textContent = res.id.slice(0,12) + '...';
        const preview = text.slice(0,50);
        await saveChain({id: res.id, preview, ts: Date.now()});
        renderSessions();
      } catch(e) {
        msgs.pop();
        addMsg('system', `Error: ${e.message}`);
        console.error(e);
      }
      els.send.disabled = false;
      els.input.disabled = false;
      els.input.focus();
    }

    els.send.onclick = send;
    els.input.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
    els.new.onclick = () => { msgs = []; curId = null; els.curId.textContent = '—'; renderMsgs(); };
    els.export.onclick = () => {
      if (!curId) return alert('No active chain');
      const blob = new Blob([JSON.stringify({id: curId, messages: msgs}, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `lattice-chain-${curId.slice(0,8)}.json`; a.click();
    };

    // ─── Boot ───────────────────────────────────────────────────────────────────
    init().catch(console.error);
    renderMsgs();
  </script>
</body>
</html>
