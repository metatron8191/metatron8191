<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Aurelian · Sovereign Core</title>
    <style>
        /* === APPLE DARK THEME — FULL WIDTH, PROFESSIONAL === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e5e5e7;
            line-height: 1.4;
            font-size: 14px;
        }

        .app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000000;
            padding: 12px 20px 0 20px;
        }

        /* === TOP BAR — MINIMAL === */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 0.5px solid #26262b;
            margin-bottom: 12px;
            color: #98989e;
            font-size: 13px;
        }

        .api-section {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .api-section:hover {
            background: #1c1c1e;
        }

        .api-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: #98989e;
        }

        .api-dot.active {
            background: #0a84ff;
        }

        #xai-display, #deepseek-display {
            color: #98989e;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
        }

        .api-divider {
            width: 1px;
            height: 20px;
            background: #26262b;
            margin: 0 4px;
        }

        .chains-badge {
            background: #1c1c1e;
            padding: 4px 12px;
            border-radius: 20px;
            color: #98989e;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chains-badge span {
            color: #0a84ff;
            font-weight: 600;
        }

        /* === CHAINS SECTION === */
        .chains-panel {
            background: #0e0e10;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 0.5px solid #26262b;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chain-label {
            color: #98989e;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .chain-id {
            font-family: 'SF Mono', Monaco, monospace;
            color: #e5e5e7;
            background: #1c1c1e;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 0.5px solid #38383a;
        }

        .chain-actions {
            display: flex;
            gap: 8px;
        }

        .chain-btn {
            background: #1c1c1e;
            border: 0.5px solid #38383a;
            color: #98989e;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-weight: 500;
        }

        .chain-btn:hover {
            background: #2c2c2e;
            color: #ffffff;
            border-color: #0a84ff;
        }

        .chain-btn.primary {
            background: #0a84ff;
            color: white;
            border: none;
        }

        /* === MEMORY TOGGLE === */
        .memory-toggle {
            background: none;
            border: none;
            color: #98989e;
            font-size: 13px;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border-bottom: 0.5px solid #26262b;
            margin-bottom: 8px;
            width: 100%;
            font-weight: 500;
        }

        .memory-toggle:hover {
            color: #0a84ff;
        }

        /* === MEMORY PANEL === */
        #memory-panel {
            background: #0e0e10;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 0.5px solid #26262b;
            max-height: 240px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .memory-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .memory-section-title {
            color: #98989e;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .memory-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .memory-item {
            padding: 8px 10px;
            background: #1c1c1e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 0.5px solid #26262b;
        }

        .memory-item:hover {
            background: #2c2c2e;
            border-color: #0a84ff;
        }

        .memory-freq {
            color: #0a84ff;
            font-weight: 600;
            font-size: 12px;
            min-width: 35px;
        }

        .memory-preview {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #e5e5e7;
            font-size: 13px;
        }

        /* === MESSAGES AREA === */
        #messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-container {
            padding: 12px 16px;
            background: #0e0e10;
            border-radius: 14px;
            border: 0.5px solid #26262b;
            max-width: 80%;
            position: relative;
        }

        .message-container[data-role="user"] {
            align-self: flex-end;
            background: #1c1c1e;
        }

        .message-container[data-role="assistant"] {
            align-self: flex-start;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            color: #98989e;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .message-role {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-role.grok {
            color: #0a84ff;
        }

        .message-role.deepseek {
            color: #ff9f0a;
        }

        .message-role.reasoner {
            color: #bf5af2;
        }

        .message-time {
            font-family: 'SF Mono', Monaco, monospace;
        }

        .message-content {
            color: #ffffff;
            font-size: 14px;
            line-height: 1.5;
            margin: 4px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-tools {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        .message-btn {
            background: #1c1c1e;
            border: 0.5px solid #38383a;
            color: #98989e;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .message-btn:hover {
            background: #2c2c2e;
            color: #0a84ff;
            border-color: #0a84ff;
        }

        .reasoning-block {
            background: #1a1a1e;
            border-left: 3px solid #0a84ff;
            padding: 8px 12px;
            margin: 8px 0 4px 0;
            border-radius: 6px;
            font-size: 12px;
            color: #98989e;
            font-family: 'SF Mono', monospace;
            white-space: pre-wrap;
        }

        .reasoning-toggle {
            color: #0a84ff;
            font-size: 11px;
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 4px;
        }

        .image-attachment {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin: 8px 0;
            border: 0.5px solid #38383a;
        }

        /* === INPUT AREA === */
        .input-area {
            background: #0e0e10;
            border-radius: 16px;
            border: 0.5px solid #26262b;
            margin: 12px 0 16px 0;
            padding: 12px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 0.5px solid #26262b;
            flex-wrap: wrap;
            align-items: center;
        }

        .tool-btn {
            background: #1c1c1e;
            border: 0.5px solid #38383a;
            color: #98989e;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-btn.active {
            background: #0a84ff;
            color: white;
            border-color: #0a84ff;
        }

        .tool-btn:hover {
            background: #2c2c2e;
            color: #0a84ff;
        }

        #model-selector {
            background: #1c1c1e;
            border: 0.5px solid #38383a;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-left: auto;
            max-width: 200px;
        }

        #model-selector option {
            background: #1c1c1e;
            color: #ffffff;
        }

        .attach-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        #file-names {
            color: #98989e;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .message-input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            background: #000000;
            border: 0.5px solid #38383a;
            border-radius: 24px;
            padding: 12px 18px;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 48px;
        }

        #message-input:focus {
            outline: none;
            border-color: #0a84ff;
        }

        #transmit-button {
            background: #0a84ff;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            min-width: 100px;
        }

        #transmit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #666;
        }

        /* === SYSTEM PANEL (TABS) === */
        .system-toggle {
            color: #98989e;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 0;
            border-top: 0.5px solid #26262b;
            margin-top: 4px;
        }

        #system-panel {
            background: #0e0e10;
            border-radius: 12px;
            padding: 16px;
            margin: 8px 0 12px 0;
            border: 0.5px solid #26262b;
        }

        .tab-btn {
            background: #1c1c1e;
            border: 0.5px solid #38383a;
            color: #98989e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .tab-btn.active {
            background: #0a84ff;
            color: white;
            border-color: #0a84ff;
        }

        .tab-btn:hover {
            background: #2c2c2e;
            color: #0a84ff;
        }

        .tab-content {
            margin-top: 12px;
        }

        #system-panel textarea {
            background: #000000;
            border: 0.5px solid #38383a;
            color: #ffffff;
            padding: 8px 10px;
            border-radius: 8px;
            width: 100%;
            font-size: 12px;
            resize: vertical;
            margin: 4px 0;
        }

        #override-count {
            background: #1c1c1e;
            color: #ffffff;
            border: 0.5px solid #38383a;
            border-radius: 12px;
            padding: 4px 8px;
            font-size: 11px;
        }

        #apply-system-all {
            margin-top: 12px;
        }

        #system-save-status {
            margin-left: 8px;
            font-size: 11px;
            color: #0a84ff;
        }

        #file-input {
            display: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0e0e10;
        }
        ::-webkit-scrollbar-thumb {
            background: #38383a;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- TOP BAR: API KEYS + CHAINS STATUS -->
        <div class="top-bar">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="api-section" onclick="promptForApiKey('xai')">
                    <div class="api-dot" id="xaiStatus"></div>
                    <span id="xai-display">xAI not set</span>
                </div>
                <div class="api-divider"></div>
                <div class="api-section" onclick="promptForApiKey('deepseek')">
                    <div class="api-dot" id="deepseekStatus"></div>
                    <span id="deepseek-display">DS not set</span>
                </div>
            </div>
            <div class="chains-badge">
                <span>⛓️</span> CHAINS <span id="chainCount">0</span>
            </div>
        </div>

        <!-- CHAINS SECTION -->
        <div class="chains-panel">
            <span class="chain-label">CURRENT</span>
            <span class="chain-id" id="currentChain">—</span>
            <div class="chain-actions">
                <button class="chain-btn" id="newChainBtn">NEW</button>
                <button class="chain-btn primary" id="exportChainBtn">EXPORT</button>
            </div>
        </div>

        <!-- MEMORY TOGGLE -->
        <button class="memory-toggle" id="toggle-memory">
            <span>📚</span> MEMORY LAYERS <span style="color:#0a84ff;">▼</span>
        </button>

        <!-- MEMORY PANEL (hidden by default) -->
        <div id="memory-panel" style="display: none;">
            <div class="memory-column">
                <div class="memory-section-title">⚡ FREQUENT (L2)</div>
                <div class="memory-list" id="active-memory-list"></div>
            </div>
            <div class="memory-column">
                <div class="memory-section-title">🔄 WORKING (L1)</div>
                <div class="memory-list" id="working-memory-list"></div>
            </div>
        </div>

        <!-- MESSAGES AREA -->
        <div id="messages-area"></div>

        <!-- INPUT AREA WITH CLEAN MODEL SELECTOR -->
        <div class="input-area">
            <div class="toolbar">
                <button class="tool-btn" id="webSearchBtn" title="Enable web search">🌐 WEB</button>
                <button class="tool-btn" id="xSearchBtn" title="Enable X search">𝕏 X</button>
                <button class="tool-btn" id="imageGenBtn" title="Generate image">🎨 IMAGE GEN</button>
                <button class="tool-btn" id="streamToggle" title="Toggle streaming">⚡ STREAM: OFF</button>
                <!-- Simple model selector with three options -->
                <select id="model-selector">
                    <option value="grok-4-1-fast-reasoning" selected>🤖 Grok Aurelian</option>
                    <option value="deepseek-chat">🔮 DeepSeek Aurelian</option>
                    <option value="deepseek-reasoner">🧠 DeepSeek Reasoner</option>
                </select>
                <span id="tool-status" style="color:#0a84ff; font-size:11px; margin-left:auto;"></span>
            </div>
            <div class="attach-row">
                <input type="file" id="file-input" multiple accept="image/*,.txt,.pdf,.json">
                <button class="tool-btn" onclick="document.getElementById('file-input').click()">📎 ATTACH</button>
                <span id="file-names"></span>
            </div>
            <div class="message-input-row">
                <textarea id="message-input" rows="1" placeholder="Message... (Drag & drop images for vision)"></textarea>
                <button id="transmit-button">TRANSMIT</button>
            </div>
        </div>

        <!-- SYSTEM MESSAGES PANEL (collapsible) -->
        <div class="system-toggle" id="systemToggle">
            <span>⚙️</span> SYSTEM MESSAGES <span style="color:#98989e;">▼</span>
        </div>
        <div id="system-panel" style="display: none;">
            <!-- Tabs -->
            <div style="display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 0.5px solid #26262b; padding-bottom: 8px;">
                <button class="tab-btn active" data-target="grok-tab">🤖 GROK</button>
                <button class="tab-btn" data-target="ds-tab">🔮 DEEPSEEK</button>
                <button class="tab-btn" data-target="override-tab">⚡ OVERRIDE</button>
            </div>

            <!-- Grok Tab -->
            <div id="grok-tab" class="tab-content">
                <div style="margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="memory-section-title">GROK SYSTEM MESSAGE</span>
                        <span id="grok-status" style="color:#0a84ff; font-size:11px;">✓ active</span>
                    </div>
                    <textarea id="grok-system" rows="3" placeholder="Grok's recurring system message..."></textarea>
                </div>
            </div>

            <!-- DeepSeek Tab -->
            <div id="ds-tab" class="tab-content" style="display: none;">
                <div style="margin-bottom: 12px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span class="memory-section-title">DEEPSEEK CHAT (recurring)</span>
                        <span id="ds-chat-status" style="color:#0a84ff; font-size:11px;">✓ active</span>
                    </div>
                    <textarea id="ds-chat-system" rows="2" placeholder="DeepSeek Chat recurring message..."></textarea>
                </div>
                <div>
                    <div style="display: flex; justify-content: space-between;">
                        <span class="memory-section-title">DEEPSEEK REASONER (recurring)</span>
                        <span id="ds-reasoner-status" style="color:#98989e; font-size:11px;">inactive</span>
                    </div>
                    <textarea id="ds-reasoner-system" rows="2" placeholder="DeepSeek Reasoner recurring message..."></textarea>
                </div>
            </div>

            <!-- Override Tab -->
            <div id="override-tab" class="tab-content" style="display: none;">
                <div style="margin-bottom: 8px;">
                    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                        <span class="memory-section-title">ONE-TIME OVERRIDE</span>
                        <select id="override-count" style="background:#1c1c1e; color:white; border:0.5px solid #38383a; border-radius:12px; padding:4px 8px;">
                            <option value="1">1 use</option>
                            <option value="2">2 uses</option>
                            <option value="3" selected>3 uses</option>
                        </select>
                        <button id="reset-override" class="tool-btn" style="padding:4px 12px;">RESET</button>
                        <span id="override-remaining" style="color:#0a84ff; font-size:11px;"></span>
                    </div>
                    <textarea id="override-system" rows="2" placeholder="Temporary message for next N interactions..."></textarea>
                    <div style="font-size:11px; color:#666; margin-top:4px;">Applies to whichever DeepSeek model is active. Resets after count reaches zero.</div>
                </div>
            </div>

            <!-- Save/Apply Button -->
            <div style="display: flex; justify-content: flex-end; margin-top: 12px;">
                <button id="apply-system-all" class="tool-btn">APPLY ALL</button>
                <span id="system-save-status" style="color:#0a84ff; margin-left:8px; font-size:11px;"></span>
            </div>
        </div>
    </div>

    <script>
        // === MEMORY CORE (unchanged) ===
        class AurelianMemory {
            constructor() {
                this.L1_KEY = 'aurelian_working';
                this.L2_KEY = 'aurelian_active';
                this.working = JSON.parse(sessionStorage.getItem(this.L1_KEY)) || [];
                this.active = JSON.parse(localStorage.getItem(this.L2_KEY)) || [];
                this.sortActive();
            }

            addWorking(content, role='user', attachments=[]) {
                const msg = {
                    id: crypto.randomUUID(),
                    role, content, attachments,
                    ts: Date.now(),
                    time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
                    reasoning: null,
                    model: null // Will be set by caller
                };
                this.working.push(msg);
                sessionStorage.setItem(this.L1_KEY, JSON.stringify(this.working));
                return msg;
            }

            addActive(content, attachments=[], meta={}) {
                const mem = {
                    id: crypto.randomUUID(),
                    content, attachments,
                    freq: 1, last: Date.now(), created: Date.now(), meta
                };
                this.active.push(mem);
                this.sortActive();
                this.trimActive();
                localStorage.setItem(this.L2_KEY, JSON.stringify(this.active));
                return mem;
            }

            sortActive() {
                this.active.sort((a,b) => b.freq - a.freq || b.last - a.last);
            }

            trimActive() {
                if (this.active.length > 100) this.active = this.active.slice(0,100);
            }

            getTopActive(n=8) {
                return this.active.slice(0,n);
            }

            buildContext() {
                const top = this.getTopActive(3);
                const recent = this.working.slice(-2);
                let ctx = '=== MEMORY CONTEXT ===\n';
                if (top.length) {
                    ctx += 'FREQUENT:\n';
                    top.forEach(m => ctx += `- [${m.freq}x] ${m.content.substring(0,100)}\n`);
                }
                if (recent.length) {
                    ctx += '\nRECENT:\n';
                    recent.forEach(m => ctx += `- ${m.role}: ${m.content.substring(0,100)}\n`);
                }
                return ctx;
            }
        }

        // === INIT ===
        const memory = new AurelianMemory();
        let xaiApiKey = localStorage.getItem('xai_api_key') || '';
        let deepseekApiKey = localStorage.getItem('deepseek_api_key') || '';
        let previousResponseId = null;

        // Tool state
        let webSearchEnabled = false;
        let xSearchEnabled = false;
        let imageGenEnabled = false;
        let streamingEnabled = false; // OFF by default

        // System message storage
        let grokSystem = localStorage.getItem('grok_system') || '';
        let dsChatSystem = localStorage.getItem('ds_chat_system') || '';
        let dsReasonerSystem = localStorage.getItem('ds_reasoner_system') || '';
        let overrideSystem = localStorage.getItem('override_system') || '';
        let overrideRemaining = parseInt(localStorage.getItem('override_remaining') || '0');

        // DOM elements
        const messagesArea = document.getElementById('messages-area');
        const msgInput = document.getElementById('message-input');
        const transmitBtn = document.getElementById('transmit-button');
        const fileInput = document.getElementById('file-input');
        const fileNames = document.getElementById('file-names');
        const xaiDisplay = document.getElementById('xai-display');
        const xaiStatus = document.getElementById('xaiStatus');
        const deepseekDisplay = document.getElementById('deepseek-display');
        const deepseekStatus = document.getElementById('deepseekStatus');
        const chainSpan = document.getElementById('currentChain');
        const chainCount = document.getElementById('chainCount');
        const webSearchBtn = document.getElementById('webSearchBtn');
        const xSearchBtn = document.getElementById('xSearchBtn');
        const imageGenBtn = document.getElementById('imageGenBtn');
        const streamToggle = document.getElementById('streamToggle');
        const toolStatus = document.getElementById('tool-status');
        const modelSelector = document.getElementById('model-selector');

        // System panel DOM elements
        const grokSystemInput = document.getElementById('grok-system');
        const dsChatInput = document.getElementById('ds-chat-system');
        const dsReasonerInput = document.getElementById('ds-reasoner-system');
        const overrideInput = document.getElementById('override-system');
        const overrideCountSelect = document.getElementById('override-count');
        const overrideRemainingSpan = document.getElementById('override-remaining');
        const resetOverrideBtn = document.getElementById('reset-override');
        const applyAllBtn = document.getElementById('apply-system-all');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        // Load system messages into UI
        grokSystemInput.value = grokSystem;
        dsChatInput.value = dsChatSystem;
        dsReasonerInput.value = dsReasonerSystem;
        overrideInput.value = overrideSystem;
        updateOverrideDisplay();

        // Tab switching
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const target = btn.dataset.target;
                tabContents.forEach(tc => tc.style.display = 'none');
                document.getElementById(target).style.display = 'block';
            });
        });

        // Apply all system messages
        applyAllBtn.addEventListener('click', () => {
            grokSystem = grokSystemInput.value;
            dsChatSystem = dsChatInput.value;
            dsReasonerSystem = dsReasonerInput.value;
            overrideSystem = overrideInput.value;
            
            localStorage.setItem('grok_system', grokSystem);
            localStorage.setItem('ds_chat_system', dsChatSystem);
            localStorage.setItem('ds_reasoner_system', dsReasonerSystem);
            localStorage.setItem('override_system', overrideSystem);
            
            if (overrideSystem && overrideRemaining === 0) {
                overrideRemaining = parseInt(overrideCountSelect.value);
                localStorage.setItem('override_remaining', overrideRemaining);
            }
            
            updateOverrideDisplay();
            document.getElementById('system-save-status').textContent = '✓ saved';
            setTimeout(() => document.getElementById('system-save-status').textContent = '', 2000);
        });

        // Reset override counter
        resetOverrideBtn.addEventListener('click', () => {
            overrideRemaining = parseInt(overrideCountSelect.value);
            localStorage.setItem('override_remaining', overrideRemaining);
            updateOverrideDisplay();
        });

        function updateOverrideDisplay() {
            overrideRemainingSpan.textContent = overrideRemaining > 0 ? `${overrideRemaining} left` : 'inactive';
            document.getElementById('ds-chat-status').style.color = overrideRemaining > 0 ? '#98989e' : '#0a84ff';
            document.getElementById('ds-reasoner-status').style.color = overrideRemaining > 0 ? '#98989e' : '#0a84ff';
        }

        // Get effective system message for a model
        function getSystemMessageForModel(model, isOverride = false) {
            if (model === 'grok-4-1-fast-reasoning') {
                return grokSystem || 'You are Aurelian, a sovereign memory core.';
            } else if (model === 'deepseek-reasoner') {
                // Check override first
                if (overrideRemaining > 0 && overrideSystem) {
                    return overrideSystem;
                }
                return dsReasonerSystem || 'You are a deep reasoning assistant.';
            } else {
                // deepseek-chat
                if (overrideRemaining > 0 && overrideSystem) {
                    return overrideSystem;
                }
                return dsChatSystem || 'You are a helpful assistant.';
            }
        }

        // Decrement override counter after use
        function useOverrideIfActive() {
            if (overrideRemaining > 0) {
                overrideRemaining--;
                localStorage.setItem('override_remaining', overrideRemaining);
                updateOverrideDisplay();
            }
        }

        // Load aurelian.txt into Grok system message if not set
        async function loadAurelianSystemMessage() {
            try {
                const response = await fetch('aurelian.txt');
                if (response.ok) {
                    const text = await response.text();
                    if (!grokSystem) {
                        grokSystem = text;
                        grokSystemInput.value = text;
                        localStorage.setItem('grok_system', text);
                    }
                }
            } catch (e) {
                console.log('Could not load aurelian.txt');
            }
        }
        loadAurelianSystemMessage();

        // API key display
        function updateApiDisplays() {
            if (xaiApiKey) {
                xaiDisplay.textContent = xaiApiKey.substring(0,4) + '...' + xaiApiKey.slice(-4);
                xaiStatus.className = 'api-dot active';
            } else {
                xaiDisplay.textContent = 'xAI not set';
                xaiStatus.className = 'api-dot';
            }
            if (deepseekApiKey) {
                deepseekDisplay.textContent = deepseekApiKey.substring(0,4) + '...' + deepseekApiKey.slice(-4);
                deepseekStatus.className = 'api-dot active';
            } else {
                deepseekDisplay.textContent = 'DS not set';
                deepseekStatus.className = 'api-dot';
            }
        }
        updateApiDisplays();

        window.promptForApiKey = function(provider) {
            const key = prompt(`Enter ${provider === 'xai' ? 'xAI' : 'DeepSeek'} API key:`);
            if (key) {
                if (provider === 'xai') {
                    xaiApiKey = key;
                    localStorage.setItem('xai_api_key', key);
                } else {
                    deepseekApiKey = key;
                    localStorage.setItem('deepseek_api_key', key);
                }
                updateApiDisplays();
            }
        };

        // Chain management
        let currentChainId = localStorage.getItem('current_chain') || crypto.randomUUID();
        localStorage.setItem('current_chain', currentChainId);
        chainSpan.textContent = currentChainId.slice(0,8);
        chainCount.textContent = memory.active.length;

        document.getElementById('newChainBtn').onclick = () => {
            currentChainId = crypto.randomUUID();
            localStorage.setItem('current_chain', currentChainId);
            chainSpan.textContent = currentChainId.slice(0,8);
            previousResponseId = null; // Reset conversation
        };

        document.getElementById('exportChainBtn').onclick = () => {
            const data = JSON.stringify({ 
                chain: currentChainId, 
                active: memory.active, 
                working: memory.working,
                previousResponseId
            }, null, 2);
            navigator.clipboard.writeText(data);
            alert('Chain data copied');
        };

        // Tool toggles
        webSearchBtn.addEventListener('click', () => {
            webSearchEnabled = !webSearchEnabled;
            webSearchBtn.classList.toggle('active', webSearchEnabled);
            updateToolStatus();
        });

        xSearchBtn.addEventListener('click', () => {
            xSearchEnabled = !xSearchEnabled;
            xSearchBtn.classList.toggle('active', xSearchEnabled);
            updateToolStatus();
        });

        imageGenBtn.addEventListener('click', () => {
            imageGenEnabled = !imageGenEnabled;
            imageGenBtn.classList.toggle('active', imageGenEnabled);
            toolStatus.textContent = imageGenEnabled ? '🎨 Image gen on' : '';
        });

        streamToggle.addEventListener('click', () => {
            streamingEnabled = !streamingEnabled;
            streamToggle.textContent = `⚡ STREAM: ${streamingEnabled ? 'ON' : 'OFF'}`;
            streamToggle.classList.toggle('active', streamingEnabled);
        });

        function updateToolStatus() {
            const tools = [];
            if (webSearchEnabled) tools.push('🌐');
            if (xSearchEnabled) tools.push('𝕏');
            toolStatus.textContent = tools.length ? `Search: ${tools.join(' ')}` : '';
        }

        // File handling with vision support
        let pendingFiles = [];
        let pendingImages = [];

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            const imageFiles = files.filter(f => f.type.startsWith('image/'));
            const otherFiles = files.filter(f => !f.type.startsWith('image/'));

            if (imageFiles.length > 0 && modelSelector.value === 'grok-4-1-fast-reasoning') {
                pendingImages = await Promise.all(imageFiles.map(async (file) => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve({
                            type: "image",
                            image_url: reader.result
                        });
                        reader.readAsDataURL(file);
                    });
                }));
            }
            
            pendingFiles = otherFiles;
            
            const allNames = [...imageFiles.map(f => f.name), ...otherFiles.map(f => f.name)];
            fileNames.textContent = allNames.join(', ');
        });

        // Drag and drop for images
        msgInput.addEventListener('dragover', (e) => e.preventDefault());
        msgInput.addEventListener('drop', async (e) => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files);
            const imageFiles = files.filter(f => f.type.startsWith('image/'));
            
            if (imageFiles.length > 0 && modelSelector.value === 'grok-4-1-fast-reasoning') {
                pendingImages = await Promise.all(imageFiles.map(async (file) => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve({
                            type: "image",
                            image_url: reader.result
                        });
                        reader.readAsDataURL(file);
                    });
                }));
                fileNames.textContent = imageFiles.map(f => f.name).join(', ');
            }
        });

        // Image generation function
        async function generateImage(prompt) {
            if (!xaiApiKey) {
                throw new Error('xAI API key required for image generation');
            }

            const response = await fetch('https://api.x.ai/v1/images/generations', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${xaiApiKey}`
                },
                body: JSON.stringify({
                    model: "grok-2-image-1212",
                    prompt: prompt,
                    n: 1,
                    size: "1024x1024"
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || `Image gen failed: ${response.status}`);
            }

            const data = await response.json();
            return data.data[0].url;
        }

        // Streaming handler
        async function handleStream(response, model) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let accumulated = '';
            let reasoning = '';

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-container streaming';
            msgDiv.setAttribute('data-role', 'assistant');
            msgDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-role">ASSISTANT (streaming)</span>
                    <span class="message-time">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="message-content" id="stream-content"></div>
            `;
            messagesArea.appendChild(msgDiv);
            const contentDiv = document.getElementById('stream-content');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        
                        try {
                            const parsed = JSON.parse(data);
                            let token;
                            
                            if (model.startsWith('grok')) {
                                token = parsed.choices?.[0]?.delta?.content;
                                if (parsed.choices?.[0]?.delta?.reasoning) {
                                    reasoning += parsed.choices[0].delta.reasoning;
                                }
                            } else {
                                token = parsed.choices?.[0]?.delta?.content;
                                if (parsed.choices?.[0]?.delta?.reasoning) {
                                    reasoning += parsed.choices[0].delta.reasoning;
                                }
                            }
                            
                            if (token) {
                                accumulated += token;
                                contentDiv.textContent = accumulated;
                                messagesArea.scrollTop = messagesArea.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
            }

            msgDiv.remove();
            const assistantMsg = memory.addWorking(accumulated, 'assistant');
            assistantMsg.model = model;
            if (reasoning) {
                assistantMsg.reasoning = reasoning;
            }
            renderMessages();
        }

        // Render messages with model-specific styling
        function renderMessages() {
            messagesArea.innerHTML = '';
            memory.working.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message-container';
                div.setAttribute('data-role', msg.role);
                
                let roleClass = '';
                let roleName = msg.role.toUpperCase();
                
                if (msg.role === 'assistant') {
                    if (msg.model === 'grok-4-1-fast-reasoning') {
                        roleClass = 'grok';
                        roleName = 'GROK AURELIAN';
                    } else if (msg.model === 'deepseek-reasoner') {
                        roleClass = 'reasoner';
                        roleName = 'DEEPSEEK REASONER';
                    } else if (msg.model === 'deepseek-chat') {
                        roleClass = 'deepseek';
                        roleName = 'DEEPSEEK AURELIAN';
                    }
                }
                
                let html = `
                    <div class="message-header">
                        <span class="message-role ${roleClass}">${roleName}</span>
                        <span class="message-time">${msg.time}</span>
                    </div>
                `;

                if (msg.content.startsWith('http') && msg.attachments?.some(a => a.name === 'generated_image')) {
                    html += `<img src="${msg.content}" class="image-attachment" alt="Generated image">`;
                } else {
                    html += `<div class="message-content">${escapeHtml(msg.content)}</div>`;
                }

                if (msg.reasoning) {
                    html += `
                        <div class="reasoning-toggle" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                            🧠 Toggle reasoning ▼
                        </div>
                        <div class="reasoning-block" style="display: none;">${escapeHtml(msg.reasoning)}</div>
                    `;
                }

                if (msg.attachments?.length) {
                    const attachmentNames = msg.attachments.map(a => a.name || a).join(', ');
                    html += `<div style="color:#0a84ff; font-size:11px; margin-top:4px;">📎 ${attachmentNames}</div>`;
                }

                html += `<div class="message-tools">`;
                html += `<button class="message-btn save-button" data-id="${msg.id}">💾 SAVE</button>`;
                html += `</div>`;
                
                div.innerHTML = html;
                messagesArea.appendChild(div);
            });

            document.querySelectorAll('.save-button').forEach(btn => {
                btn.onclick = (e) => {
                    const id = e.target.dataset.id;
                    const msg = memory.working.find(m => m.id === id);
                    if (msg) {
                        memory.addActive(`${msg.role}: ${msg.content}`, msg.attachments);
                        updateMemoryPanels();
                        chainCount.textContent = memory.active.length;
                    }
                };
            });

            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;'; 
                if(m === '<') return '&lt;'; 
                if(m === '>') return '&gt;'; 
                if(m === '"') return '&quot;';
                return m;
            });
        }

        // Memory panels update
        function updateMemoryPanels() {
            const activeList = document.getElementById('active-memory-list');
            const workingList = document.getElementById('working-memory-list');
            if (!activeList) return;

            activeList.innerHTML = '';
            memory.getTopActive(8).forEach(m => {
                const d = document.createElement('div');
                d.className = 'memory-item';
                d.onclick = () => msgInput.value = m.content;
                d.innerHTML = `
                    <span class="memory-freq">${m.freq}x</span>
                    <span class="memory-preview">${escapeHtml(m.content.substring(0,40))}</span>
                `;
                activeList.appendChild(d);
            });

            workingList.innerHTML = '';
            memory.working.slice(-5).reverse().forEach(m => {
                const d = document.createElement('div');
                d.className = 'memory-item';
                d.innerHTML = `
                    <span style="color:#0a84ff; min-width:35px;">${m.role}</span>
                    <span class="memory-preview">${escapeHtml(m.content.substring(0,30))}</span>
                `;
                workingList.appendChild(d);
            });
        }

        // Transmit handler
        transmitBtn.addEventListener('click', async () => {
            const content = msgInput.value.trim();
            const selectedModel = modelSelector.value;

            // Handle image generation separately
            if (imageGenEnabled && selectedModel === 'grok-4-1-fast-reasoning') {
                if (!content) {
                    alert('Please enter a prompt for image generation');
                    return;
                }
                if (!xaiApiKey) {
                    alert('Please set your xAI API key first');
                    return;
                }

                transmitBtn.disabled = true;
                transmitBtn.textContent = '🎨';

                try {
                    const imageUrl = await generateImage(content);
                    memory.addWorking(content, 'user');
                    const assistantMsg = memory.addWorking(imageUrl, 'assistant', [{ name: 'generated_image' }]);
                    assistantMsg.model = selectedModel;
                    renderMessages();
                } catch (error) {
                    memory.addWorking(`⚠️ Image generation failed: ${error.message}`, 'system');
                    renderMessages();
                } finally {
                    transmitBtn.disabled = false;
                    transmitBtn.textContent = 'TRANSMIT';
                    msgInput.value = '';
                }
                return;
            }

            if (!content && pendingFiles.length === 0 && pendingImages.length === 0) return;

            if (selectedModel.startsWith('deepseek') && !deepseekApiKey) {
                alert('Please set your DeepSeek API key first');
                return;
            }
            if (selectedModel === 'grok-4-1-fast-reasoning' && !xaiApiKey) {
                alert('Please set your xAI API key first');
                return;
            }

            transmitBtn.disabled = true;
            transmitBtn.textContent = '...';

            const attachments = [...pendingFiles.map(f => ({ name: f.name }))];
            if (pendingImages.length > 0) {
                attachments.push({ name: `${pendingImages.length} image(s)` });
            }
            const userMsg = memory.addWorking(content, 'user', attachments);
            userMsg.model = selectedModel;
            renderMessages();
            updateMemoryPanels();

            try {
                const context = memory.buildContext();
                const systemMessage = getSystemMessageForModel(selectedModel) + '\n\n' + context;

                const messages = [
                    { role: 'system', content: systemMessage }
                ];

                memory.working.slice(-10).forEach(m => {
                    if (m.role === 'user') {
                        if (selectedModel === 'grok-4-1-fast-reasoning' && m.id === userMsg.id && pendingImages.length > 0) {
                            const contentArray = [
                                { type: "text", text: m.content || " " },
                                ...pendingImages
                            ];
                            messages.push({ role: "user", content: contentArray });
                        } else {
                            messages.push({ role: "user", content: m.content });
                        }
                    } else {
                        messages.push({ role: "assistant", content: m.content });
                    }
                });

                const tools = [];
                if (webSearchEnabled) tools.push({ type: "web_search" });
                if (xSearchEnabled) tools.push({ type: "x_search" });

                let reply = '';
                let reasoning = null;

                if (selectedModel.startsWith('deepseek')) {
                    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${deepseekApiKey}`
                        },
                        body: JSON.stringify({
                            model: selectedModel,
                            messages: messages,
                            tools: tools.length ? tools : undefined,
                            temperature: 0.7,
                            max_tokens: 2000,
                            stream: streamingEnabled
                        })
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error?.message || `API error: ${response.status}`);
                    }

                    if (streamingEnabled) {
                        await handleStream(response, selectedModel);
                        useOverrideIfActive();
                        transmitBtn.disabled = false;
                        transmitBtn.textContent = 'TRANSMIT';
                        msgInput.value = '';
                        pendingFiles = []; pendingImages = []; fileNames.textContent = '';
                        return;
                    }

                    const data = await response.json();
                    if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                        console.error('Invalid DeepSeek response structure:', data);
                        throw new Error('Invalid API response structure');
                    }
                    reply = data.choices[0].message.content;
                    reasoning = data.choices[0].message.reasoning;

                    if (!reply) {
                        console.warn('Empty reply from DeepSeek, full response:', data);
                        reply = '[Empty response received from DeepSeek]';
                    }

                } else { // Grok
                    const response = await fetch('https://api.x.ai/v1/responses', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${xaiApiKey}`
                        },
                        body: JSON.stringify({
                            model: selectedModel,
                            input: messages,
                            tools: tools.length ? tools : undefined,
                            previous_response_id: previousResponseId,
                            store: true,
                            temperature: 0.7,
                            max_output_tokens: 2000,
                            stream: streamingEnabled
                        })
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        if (response.status === 401) previousResponseId = null;
                        throw new Error(error.error?.message || `API error: ${response.status}`);
                    }

                    if (streamingEnabled) {
                        await handleStream(response, selectedModel);
                        transmitBtn.disabled = false;
                        transmitBtn.textContent = 'TRANSMIT';
                        msgInput.value = '';
                        pendingFiles = []; pendingImages = []; fileNames.textContent = '';
                        return;
                    }

                    const data = await response.json();
                    console.log('Grok API response:', data);

                    if (!data || !data.output || !Array.isArray(data.output)) {
                        console.error('Invalid Grok response structure:', data);
                        throw new Error('Invalid API response structure');
                    }

                    if (data.id) {
                        previousResponseId = data.id;
                    }

                    const messageItem = data.output.find(item => item.type === 'message');
                    if (!messageItem || !messageItem.content) {
                        console.warn('No message content in Grok response, output:', data.output);
                        reply = '[No message content]';
                    } else {
                        const textItem = messageItem.content.find(c => c.type === 'output_text');
                        reply = textItem?.text || JSON.stringify(messageItem.content);
                    }

                    if (!reply) {
                        console.warn('Empty reply from Grok, full response:', data);
                        reply = '[Empty response received from Grok]';
                    }
                }

                if (reply) {
                    const assistantMsg = memory.addWorking(reply, 'assistant');
                    assistantMsg.model = selectedModel;
                    if (reasoning) assistantMsg.reasoning = reasoning;
                }

                if (selectedModel.startsWith('deepseek')) {
                    useOverrideIfActive();
                }

                renderMessages();
                updateMemoryPanels();
                chainCount.textContent = memory.active.length;

            } catch (error) {
                console.error('API Error:', error);
                memory.addWorking(`⚠️ Error: ${error.message}`, 'system');
                renderMessages();
                previousResponseId = null;
            } finally {
                transmitBtn.disabled = false;
                transmitBtn.textContent = 'TRANSMIT';
                msgInput.value = '';
                pendingFiles = [];
                pendingImages = [];
                fileNames.textContent = '';
                msgInput.style.height = 'auto';
            }
        });

        // Toggles
        document.getElementById('toggle-memory').addEventListener('click', () => {
            const p = document.getElementById('memory-panel');
            p.style.display = p.style.display === 'none' ? 'grid' : 'none';
            updateMemoryPanels();
        });

        document.getElementById('systemToggle').addEventListener('click', () => {
            const p = document.getElementById('system-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        });

        // Initial render
        renderMessages();
        updateMemoryPanels();

        // Auto-grow textarea
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(120, this.scrollHeight) + 'px';
        });

        // Enter to send
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                transmitBtn.click();
            }
        });
    </script>
</body>
