<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilareyon • Noetic Fabric</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Threads Panel (hidden by default, toggled via button) -->
    <div id="threads-panel-placeholder"></div>
    
    <!-- Main App -->
    <div class="app">
        <div class="main">
            <div id="header-placeholder"></div>
            <div id="toolbar-placeholder"></div>
            <div id="messages-area" class="messages">
                <div class="welcome-screen">
                    <div class="eye-symbol">𓂀</div>
                    <div class="welcome-title">LILAREYON NOETIC FABRIC</div>
                </div>
            </div>
            <div id="input-area-placeholder"></div>
        </div>
        <div id="right-panel-placeholder"></div>
    </div>
    
    <!-- Other Panels -->
    <div id="system-panel-placeholder"></div>
    <div id="genesis-panel-placeholder"></div>
    <div id="fabric-panel-placeholder"></div>

    <!-- Scripts -->
    <script src="js/memory-core.js"></script>
    <script src="js/ui-renderer.js"></script>
    <script src="js/api-handlers.js"></script>
    <script src="db/memory-vault.js"></script>
    <script src="js/memory-fabric.js"></script>
    <script src="js/memory-sync.js"></script>
    <script src="js/genesis.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        const CURRENT_PATH = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        window.CURRENT_PATH = CURRENT_PATH;
        
        async function loadComponent(id, file) {
            try {
                const res = await fetch(CURRENT_PATH + file);
                if (!res.ok) throw new Error(res.status);
                document.getElementById(id).innerHTML = await res.text();
                console.log(`✅ Loaded ${id}`);
                return true;
            } catch(e) {
                console.error(`❌ Failed ${id}:`, e);
                document.getElementById(id).innerHTML = `<div class="load-error">Failed to load ${file}</div>`;
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadComponent('threads-panel-placeholder', 'components/threads-panel.html'),
                loadComponent('header-placeholder', 'components/header.html'),
                loadComponent('toolbar-placeholder', 'components/toolbar.html'),
                loadComponent('input-area-placeholder', 'components/input-area.html'),
                loadComponent('right-panel-placeholder', 'components/right-panel.html'),
                loadComponent('system-panel-placeholder', 'components/system-panel.html'),
                loadComponent('genesis-panel-placeholder', 'components/genesis/genesis-panel.html'),
                loadComponent('fabric-panel-placeholder', 'components/fabric-panel.html')
            ]);
            window.dispatchEvent(new Event('componentsLoaded'));
        });
    </script>
</body>
</html>
