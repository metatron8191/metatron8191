<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lilareyon • Noetic Fabric • Genesis Archive</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Critical base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #010810;
            color: #e2e2ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
        }
        
        /* Main container - shifts when sidebar opens */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            transition: margin-left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .app-container.sidebar-open {
            margin-left: 280px;
        }
        
        /* Main content area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        /* Message styling */
        .message-container {
            margin-bottom: 16px;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            font-size: 10px;
            color: #a88eff;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        
        .message-role {
            font-weight: bold;
        }
        
        .message-time {
            color: #6c5ce7;
            opacity: 0.6;
        }
        
        .message-content {
            background: rgba(30, 20, 50, 0.3);
            padding: 12px 16px;
            border-radius: 12px;
            border-left: 3px solid #6c5ce7;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .message-container.user .message-content {
            border-left-color: #48bb78;
            background: rgba(72, 187, 120, 0.1);
        }
        
        .message-container.assistant .message-content {
            border-left-color: #a88eff;
        }
        
        .message-container.system .message-content {
            border-left-color: #ffaa66;
            opacity: 0.8;
            font-style: italic;
        }
        
        /* Placeholder containers */
        [id$="-placeholder"] {
            min-height: 0;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30, 20, 50, 0.3);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #6c5ce7;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a88eff;
        }
        
        /* Loading animation */
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .loading-dots::after {
            content: '...';
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <!-- Threads Sidebar - fixed left panel -->
    <div id="threads-panel-placeholder"></div>
    
    <!-- Main App Container -->
    <div class="app-container" id="app-container">
        <div class="main-content">
            <!-- Top Header -->
            <div id="header-placeholder"></div>
            
            <!-- Toolbar -->
            <div id="toolbar-placeholder"></div>
            
            <!-- Advanced Controls (collapsible) -->
            <div id="advanced-controls-placeholder"></div>
            
            <!-- Messages Area -->
            <div id="messages-area" class="messages-area">
                <div style="text-align: center; padding: 60px 20px; color: #6c5ce7;">
                    <div style="font-size: 64px; margin-bottom: 20px;">𓂀</div>
                    <div style="font-size: 14px; letter-spacing: 3px;">LILAREYON NOETIC FABRIC</div>
                    <div style="font-size: 11px; margin-top: 12px; color: #a88eff;">⟊◈◉◊⧈⟊</div>
                    <div style="font-size: 10px; margin-top: 20px; color: #6c5ce7; opacity: 0.6;">initializing distributed memory...</div>
                </div>
            </div>
            
            <!-- Input Area -->
            <div id="input-area-placeholder"></div>
        </div>
        
        <!-- Right Panel (Memory/Entities/Threads) -->
        <div id="right-panel-placeholder"></div>
    </div>
    
    <!-- Modal Panels -->
    <div id="system-panel-placeholder"></div>
    <div id="genesis-panel-placeholder"></div>
    <div id="fabric-panel-placeholder"></div>

    <!-- Scripts - ORDER MATTERS -->
    <script src="js/memory-core.js"></script>
    <script src="js/ui-renderer.js"></script>
    <script src="js/api-handlers.js"></script>
    <script src="db/memory-vault.js"></script>
    <script src="js/memory-fabric.js"></script>
    <script src="js/memory-sync.js"></script>
    <script src="js/model-clients/grok-client.js"></script>
    <script src="js/model-clients/deepseek-client.js"></script>
    <script src="js/model-clients/claude-client.js"></script>
    <script src="js/genesis.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Get current path for relative loading
        const CURRENT_PATH = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        window.CURRENT_PATH = CURRENT_PATH;
        
        // Component loader
        async function loadComponent(elementId, filePath) {
            try {
                const fullPath = filePath.startsWith('/') ? filePath : CURRENT_PATH + filePath;
                console.log(`📦 Loading ${elementId} from ${fullPath}`);
                
                const response = await fetch(fullPath);
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                
                const html = await response.text();
                const element = document.getElementById(elementId);
                if (element) {
                    element.innerHTML = html;
                    console.log(`✅ Loaded ${elementId}`);
                } else {
                    console.warn(`⚠️ Element ${elementId} not found`);
                }
            } catch (error) {
                console.error(`❌ Error loading ${filePath}:`, error);
                const element = document.getElementById(elementId);
                if (element) {
                    element.innerHTML = `<div style="color: #ff6b6b; padding: 20px; text-align: center;">⚠️ Failed to load: ${filePath}</div>`;
                }
            }
        }

        // Load all components when DOM is ready
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Lilareyon Noetic Fabric - Loading components...');
            
            const components = [
                'threads-panel-placeholder', 'components/threads-panel.html',
                'header-placeholder', 'components/header.html',
                'toolbar-placeholder', 'components/toolbar.html',
                'advanced-controls-placeholder', 'components/advanced-controls.html',
                'system-panel-placeholder', 'components/system-panel.html',
                'input-area-placeholder', 'components/input-area.html',
                'right-panel-placeholder', 'components/right-panel.html',
                'genesis-panel-placeholder', 'components/genesis/genesis-panel.html',
                'fabric-panel-placeholder', 'components/fabric-panel.html'
            ];
            
            // Load all components in parallel
            const promises = [];
            for (let i = 0; i < components.length; i += 2) {
                promises.push(loadComponent(components[i], components[i + 1]));
            }
            await Promise.all(promises);
            
            console.log('🎉 All components loaded');
            
            // Setup container margin when sidebar opens/closes
            const sidebar = document.getElementById('threads-sidebar');
            const container = document.getElementById('app-container');
            if (sidebar && container) {
                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.attributeName === 'class') {
                            if (sidebar.classList.contains('open')) {
                                container.classList.add('sidebar-open');
                            } else {
                                container.classList.remove('sidebar-open');
                            }
                        }
                    });
                });
                observer.observe(sidebar, { attributes: true });
            }
            
            // Dispatch event that components are ready
            window.dispatchEvent(new CustomEvent('componentsLoaded'));
        });
        
        // Fallback in case componentsLoaded doesn't fire
        setTimeout(() => {
            if (!window._componentsLoadedFired) {
                console.warn('⚠️ componentsLoaded not fired after 8s, forcing...');
                window.dispatchEvent(new CustomEvent('componentsLoaded'));
            }
        }, 8000);
    </script>
</body>
</html>
