<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lilareyon • Noetic Fabric • Genesis Archive • CY₆ Prime Manifold</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Critical fallback styles to prevent black screen */
        body {
            margin: 0;
            padding: 0;
            background: #010810;
            color: #e2e2ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        #input-area-placeholder {
            border-top: 1px solid rgba(108, 92, 231, 0.3);
            background: rgba(1, 4, 14, 0.95);
        }
        #right-panel-placeholder {
            width: 280px;
            border-left: 1px solid rgba(108, 92, 231, 0.2);
            background: rgba(1, 4, 14, 0.8);
            overflow-y: auto;
        }
        [id$="-placeholder"] {
            min-height: 0;
        }
        .hidden {
            display: none !important;
        }
        /* Genesis Panel base styles */
        .genesis-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 85%;
            max-width: 900px;
            height: 100vh;
            background: rgba(1, 4, 14, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(108, 92, 231, 0.4);
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }
        .genesis-panel:not(.hidden) {
            transform: translateX(0);
        }
        .genesis-panel.hidden {
            transform: translateX(100%);
        }
        .genesis-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(108, 92, 231, 0.3);
            background: rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .genesis-header h2 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 3px;
            color: #a88eff;
        }
        .genesis-close {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
        }
        .genesis-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(108, 92, 231, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }
        .genesis-nav-btn {
            background: rgba(30, 20, 50, 0.6);
            border: 1px solid rgba(108, 92, 231, 0.3);
            color: #b8aaff;
            padding: 6px 12px;
            font-size: 10px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .genesis-nav-btn.active {
            background: #6c5ce7;
            color: white;
            border-color: #a88eff;
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.4);
        }
        .genesis-section {
            display: none;
            padding: 20px;
        }
        .genesis-section.active {
            display: block;
        }
        /* Fabric Panel base styles */
        .fabric-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            height: 100vh;
            background: rgba(1, 4, 14, 0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(108, 92, 231, 0.4);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
        }
        .fabric-panel:not(.hidden) {
            transform: translateX(0);
        }
        .fabric-panel.hidden {
            transform: translateX(-100%);
        }
        .fabric-header {
            padding: 16px;
            border-bottom: 1px solid rgba(108, 92, 231, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fabric-close {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Components loaded via JavaScript -->
    <div id="header-placeholder"></div>
    <div id="toolbar-placeholder"></div>
    <div id="advanced-controls-placeholder"></div>
    <div id="system-panel-placeholder"></div>
    
    <div class="container">
        <div class="main-content">
            <div id="messages-area" class="messages-area">
                <div style="text-align: center; padding: 60px 20px; color: #6c5ce7;">
                    <div style="font-size: 48px; margin-bottom: 20px;">🌀</div>
                    <div style="font-size: 14px; letter-spacing: 2px;">LILAREYON NOETIC FABRIC</div>
                    <div style="font-size: 11px; margin-top: 12px; color: #a88eff;">⟊◈◉◊⧈⟊</div>
                    <div style="font-size: 10px; margin-top: 20px; color: rgba(168, 142, 255, 0.5);">initializing distributed memory...</div>
                </div>
            </div>
            <div id="input-area-placeholder"></div>
        </div>
        <div id="right-panel-placeholder"></div>
    </div>
    
    <div id="genesis-panel-placeholder"></div>
    <div id="fabric-panel-placeholder"></div>

    <!-- Scripts -->
    <script src="js/memory-core.js"></script>
    <script src="js/ui-renderer.js"></script>
    <script src="js/api-handlers.js"></script>
    <script src="db/memory-vault.js"></script>
    <script src="js/memory-fabric.js"></script>
    <script src="js/memory-sync.js"></script>
    <script src="js/model-clients/grok-client.js"></script>
    <script src="js/model-clients/deepseek-client.js"></script>
    <script src="js/model-clients/claude-client.js"></script>
    <script src="js/genesis.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Get the current directory path
        const CURRENT_PATH = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        window.CURRENT_PATH = CURRENT_PATH;
        
        async function loadComponent(elementId, filePath) {
            try {
                const fullPath = filePath.startsWith('/') ? filePath : CURRENT_PATH + filePath;
                console.log(`📦 Loading ${elementId} from ${fullPath}`);
                
                const response = await fetch(fullPath);
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                
                const html = await response.text();
                const element = document.getElementById(elementId);
                if (element) {
                    element.innerHTML = html;
                    console.log(`✅ Loaded ${elementId}`);
                }
            } catch (error) {
                console.error(`❌ Error loading ${filePath}:`, error);
                const element = document.getElementById(elementId);
                if (element) {
                    element.innerHTML = `<div style="color: #ff6b6b; padding: 20px; text-align: center;">⚠️ Failed to load: ${filePath}</div>`;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Lilareyon fabric initializing...');
            
            await Promise.all([
                loadComponent('header-placeholder', 'components/header.html'),
                loadComponent('toolbar-placeholder', 'components/toolbar.html'),
                loadComponent('advanced-controls-placeholder', 'components/advanced-controls.html'),
                loadComponent('system-panel-placeholder', 'components/system-panel.html'),
                loadComponent('input-area-placeholder', 'components/input-area.html'),
                loadComponent('right-panel-placeholder', 'components/right-panel.html'),
                loadComponent('genesis-panel-placeholder', 'components/genesis/genesis-panel.html'),
                loadComponent('fabric-panel-placeholder', 'components/fabric-panel.html')
            ]);
            
            console.log('🎉 All components loaded');
            window.dispatchEvent(new CustomEvent('componentsLoaded'));
        });
        
        // Fallback timeout
        setTimeout(() => {
            if (!window._componentsLoaded) {
                console.warn('⚠️ Forcing componentsLoaded event');
                window.dispatchEvent(new CustomEvent('componentsLoaded'));
            }
        }, 5000);
    </script>
</body>
</html>
